<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>竹建瓦斯｜會議暨教育訓練追蹤系統</title>
<style>
:root{
  --ink:#1f2a37;--ink2:#5b6675;--line:#e3e7ec;--bg:#f5f6f8;--card:#fff;
  --brand:#1c6b5b;--brand-soft:#e6f1ee;--accent:#c9742a;--accent-soft:#fdf0e3;
  --warn:#b5453d;--warn-soft:#fbe9e8;--ok:#2e7d52;--ok-soft:#e6f4ec;--gray-soft:#eef1f4;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:"Microsoft JhengHei","微軟正黑體",sans-serif;background:var(--bg);color:var(--ink);font-size:15px;line-height:1.65}
.topbar{background:var(--brand);color:#fff;padding:14px 22px;display:flex;align-items:center;gap:14px;flex-wrap:wrap}
.topbar h1{font-size:18px;font-weight:700;letter-spacing:.5px}
.topbar .sub{font-size:12px;opacity:.85}
.role-switch{margin-left:auto;display:flex;gap:6px;background:rgba(255,255,255,.15);padding:4px;border-radius:10px}
.role-switch button{border:none;background:transparent;color:#fff;padding:6px 14px;border-radius:7px;cursor:pointer;font-size:13px;font-family:inherit;font-weight:600}
.role-switch button.active{background:#fff;color:var(--brand)}
.wrap{max-width:1200px;margin:0 auto;padding:22px}
.role-hint{background:var(--brand-soft);border:1px solid #cfe3dd;color:#1c5448;padding:10px 16px;border-radius:10px;font-size:13px;margin-bottom:18px}
.cfgbar{background:#fff8ec;border:1px solid #f0dcb8;color:#8a5a16;padding:10px 16px;border-radius:10px;font-size:13px;margin-bottom:16px;display:flex;gap:10px;align-items:center;flex-wrap:wrap}
.cfgbar input{flex:1;min-width:240px}
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin-bottom:20px}
.stat{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:16px 18px}
.stat .n{font-size:28px;font-weight:800;line-height:1}
.stat .l{font-size:12px;color:var(--ink2);margin-top:6px}
.stat.warn .n{color:var(--warn)}.stat.ok .n{color:var(--ok)}.stat.brand .n{color:var(--brand)}.stat.accent .n{color:var(--accent)}
.toolbar{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-bottom:14px}
.btn{border:none;border-radius:9px;padding:10px 18px;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;transition:.15s}
.btn-primary{background:var(--brand);color:#fff}.btn-primary:hover{background:#155345}
.btn-ghost{background:#fff;color:var(--ink);border:1px solid var(--line)}.btn-ghost:hover{border-color:#c3cad3}
.btn-danger{background:#fff;color:var(--warn);border:1px solid #f0cfcc}.btn-danger:hover{background:var(--warn-soft)}
.btn-sm{padding:7px 13px;font-size:14px;border-radius:7px}
input,select,textarea{font-family:inherit;font-size:14px;border:1px solid var(--line);border-radius:8px;padding:9px 11px;width:100%;color:var(--ink);background:#fff}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--brand)}
.search{max-width:240px}.filter{max-width:150px}
table{width:100%;border-collapse:collapse;background:var(--card);border-radius:12px;overflow:hidden;border:1px solid var(--line)}
thead th{background:#f0f2f5;text-align:left;padding:13px 14px;font-size:14px;color:var(--ink2);font-weight:700;white-space:nowrap;border-bottom:1px solid var(--line)}
tbody td{padding:13px 14px;border-bottom:1px solid #eef1f4;vertical-align:top;font-size:14.5px}
tbody tr:last-child td{border-bottom:none}tbody tr:hover{background:#fafbfc}
.tag{display:inline-block;padding:4px 11px;border-radius:20px;font-size:13px;font-weight:600;white-space:nowrap}
.tag-wait{background:var(--gray-soft);color:#5b6675}.tag-archived{background:var(--accent-soft);color:#9c5715}
.tag-pending{background:#ede4f6;color:#6b3fa0}
.tag-assigned{background:var(--brand-soft);color:#1c5448}.tag-done{background:var(--ok-soft);color:var(--ok)}
.tag-overdue{background:var(--warn-soft);color:var(--warn)}.tag-none{background:var(--gray-soft);color:#8a93a0}
.occ{font-size:12.5px;color:var(--ink2);display:inline-block;margin-top:3px}
.muted{color:#9aa3af}
.namebox{display:flex;flex-wrap:wrap;gap:4px}
.chip{background:var(--brand-soft);color:#1c5448;padding:3px 9px;border-radius:6px;font-size:13px}
.actions{display:flex;gap:6px;flex-wrap:wrap}
.mask{position:fixed;inset:0;background:rgba(20,28,38,.45);display:none;align-items:flex-start;justify-content:center;padding:40px 16px;overflow:auto;z-index:50}
.mask.show{display:flex}
.modal{background:#fff;border-radius:16px;width:100%;max-width:560px;padding:24px;box-shadow:0 20px 60px rgba(0,0,0,.2)}
.modal h2{font-size:18px;margin-bottom:4px}.modal .desc{font-size:12px;color:var(--ink2);margin-bottom:18px}
.field{margin-bottom:14px}.field label{display:block;font-size:13px;font-weight:600;margin-bottom:5px}
.field .req{color:var(--warn)}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.modal-foot{display:flex;gap:10px;justify-content:flex-end;margin-top:20px}
.checklist{border:1px solid var(--line);border-radius:8px;padding:10px;max-height:200px;overflow:auto;background:#fafbfc}
.checklist .dept-h{font-size:12px;font-weight:700;color:var(--brand);margin:8px 0 4px;padding-bottom:3px;border-bottom:1px solid var(--line)}
.checklist .dept-h:first-child{margin-top:0}
.checklist label{display:flex;align-items:center;gap:7px;padding:4px 6px;border-radius:6px;cursor:pointer;font-weight:400;font-size:13px}
.checklist label:hover{background:#fff}.checklist input{width:auto}
.empty{text-align:center;padding:50px 20px;color:#9aa3af}.empty .big{font-size:15px;margin-bottom:6px;color:var(--ink2)}
.legend{font-size:12px;color:var(--ink2);margin-top:14px;display:flex;gap:14px;flex-wrap:wrap}
.footer{text-align:center;color:#9aa3af;font-size:12px;padding:24px}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#1f2a37;color:#fff;padding:11px 20px;border-radius:10px;font-size:14px;z-index:99;opacity:0;transition:.25s;pointer-events:none}
.toast.show{opacity:1}
.loading{text-align:center;padding:50px 20px;color:var(--ink2);font-size:15px}
.spinner{width:42px;height:42px;margin:0 auto 16px;border:4px solid var(--brand-soft);border-top-color:var(--brand);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading .hint{font-size:14px;color:#9aa3af;margin-top:6px}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
tbody tr{animation:fadeIn .3s ease both}
@media(max-width:760px){
  .wrap{padding:12px}
  .grid2{grid-template-columns:1fr}
  .topbar h1{font-size:17px}
  .role-switch{width:100%;margin-left:0}
  .role-switch button{flex:1;font-size:13px;padding:8px 6px}
  .stats{grid-template-columns:repeat(3,1fr);gap:8px}
  .stat{padding:12px 10px}
  .stat .n{font-size:22px}
  .stat .l{font-size:11px}
  /* 表格 → 卡片 */
  table,thead,tbody,tr,td{display:block;width:100%}
  thead{display:none}
  table{border:none;background:transparent}
  tbody tr{background:var(--card);border:1px solid var(--line);border-radius:14px;margin-bottom:14px;padding:6px 4px;box-shadow:0 1px 3px rgba(0,0,0,.04)}
  tbody td{border:none;padding:9px 14px;display:flex;justify-content:space-between;align-items:flex-start;gap:12px;font-size:15px}
  tbody td::before{content:attr(data-label);font-weight:700;color:var(--ink2);font-size:13px;flex-shrink:0;min-width:72px}
  tbody td[data-label="會議"]{flex-direction:column;gap:4px}
  tbody td[data-label="會議"]::before{margin-bottom:2px}
  tbody td[data-label="會議"] b{font-size:16px}
  .hide-sm{display:flex !important}
  .namebox{justify-content:flex-end}
  .actions{justify-content:flex-end;flex-wrap:wrap}
  .btn-sm{padding:9px 15px;font-size:15px}
  .toolbar{gap:8px}
  .search,.filter{max-width:none;flex:1 1 100%}
}
</style>
</head>
<body>
<div class="topbar">
  <div>
    <h1>會議暨教育訓練追蹤系統</h1>
    <div class="sub">竹建瓦斯股份有限公司 ｜ 管理部</div>
  </div>
  <div class="role-switch" id="roleSwitch">
    <button data-role="admin" class="active">管理部（建檔）</button>
    <button data-role="manager">部門主管（指派）</button>
    <button data-role="boss">總經理（檢視）</button>
  </div>
</div>

<div class="wrap">
  <div class="cfgbar" id="cfgbar">
    <span>⚙️ 後端網址 (GAS URL)：</span>
    <input id="gasUrl" placeholder="貼上你部署後的 https://script.google.com/macros/s/.../exec">
    <button class="btn btn-primary btn-sm" id="btnSaveUrl">儲存並連線</button>
  </div>

  <div class="role-hint" id="roleHint"></div>
  <div class="stats" id="stats"></div>

  <div class="toolbar">
    <button class="btn btn-primary" id="btnNew">＋ 收文建檔</button>
    <input class="search" id="search" placeholder="搜尋會議名稱 / 文號 / 主辦單位…">
    <select class="filter" id="fDept"><option value="">全部部門</option></select>
    <select class="filter" id="fStatus">
      <option value="">全部狀態</option>
      <option value="待歸檔">待歸檔</option><option value="待指派">待指派</option>
      <option value="待報告">待報告</option><option value="逾期">逾期</option>
      <option value="已報告">已報告</option><option value="免報告">免報告</option>
    </select>
    <button class="btn btn-ghost btn-sm" id="btnImport">📋 一鍵匯入行事曆</button>
    <button class="btn btn-ghost btn-sm" id="btnReload">🔄 重新整理</button>
    <button class="btn btn-ghost btn-sm" id="btnExport" style="margin-left:auto">匯出 CSV</button>
  </div>

  <div id="tableArea"><div class="loading">請先在上方貼入後端網址並連線…</div></div>

  <div class="legend">
    流程：<span class="tag tag-wait">待歸檔</span> → <span class="tag tag-archived">待指派</span> →
    <span class="tag tag-assigned">待報告</span> → <span class="tag tag-done">已報告</span>
    ｜ <span class="tag tag-overdue">逾期</span> ｜ <span class="tag tag-none">免報告</span>
  </div>
</div>

<!-- 建檔/編輯 -->
<div class="mask" id="maskEdit"><div class="modal">
  <h2 id="editTitle">收文建檔</h2>
  <div class="desc">收文當下先建立事件；公文歸檔回來後再補參加人員。</div>
  <div class="grid2">
    <div class="field"><label>收文日期 <span class="req">*</span></label><input type="date" id="f_recv"></div>
    <div class="field"><label>文號</label><input id="f_no" placeholder="例：竹建字第1150123號"></div>
  </div>
  <div class="field"><label>會議／說明會／教育訓練名稱 <span class="req">*</span></label><input id="f_name"></div>
  <div class="grid2">
    <div class="field"><label>主辦單位</label><input id="f_org"></div>
    <div class="field"><label>會議日期</label><input type="date" id="f_date"></div>
  </div>
  <div class="grid2">
    <div class="field"><label>承辦部門 <span class="req">*</span></label><select id="f_dept"></select></div>
    <div class="field"><label>類別</label><select id="f_type"><option>會議</option><option>說明會</option><option>教育訓練</option><option>研習</option><option>參訪</option></select></div>
  </div>
  <div class="field"><label>參加人員 <span class="muted">（歸檔後再勾選，現在可留空）</span></label><div class="checklist" id="f_people"></div></div>
  <div class="field"><label>備註</label><textarea id="f_note" rows="2"></textarea></div>
  <div class="modal-foot">
    <button class="btn btn-ghost" onclick="closeModal('maskEdit')">取消</button>
    <button class="btn btn-primary" id="btnSave">儲存</button>
  </div>
</div></div>

<!-- 指派 -->
<div class="mask" id="maskAssign"><div class="modal">
  <h2>指派報告</h2>
  <div class="desc" id="assignSub"></div>
  <div class="field"><label>報告場合 <span class="req">*</span></label>
    <select id="a_occ"><option value="免報告">免報告（存查結案）</option><option value="職員會議">職員會議</option><option value="主管會議">主管會議</option></select></div>
  <div id="a_detail">
  <div class="field"><label>指派報告人</label><div class="checklist" id="a_people"></div></div>
  <div class="field"><label>預計報告日</label><input type="date" id="a_date"></div>
  </div>
  <div class="modal-foot">
    <button class="btn btn-ghost" onclick="closeModal('maskAssign')">取消</button>
    <button class="btn btn-primary" id="btnAssignSave">確定指派</button>
  </div>
</div></div>

<!-- 總經理改期核准 -->
<div class="mask" id="maskApprove"><div class="modal">
  <h2>核准報告（可改期）</h2>
  <div class="desc" id="apvSub"></div>
  <div class="field"><label>核定報告日期</label><input type="date" id="apv_date"></div>
  <div class="modal-foot">
    <button class="btn btn-ghost" onclick="closeModal('maskApprove')">取消</button>
    <button class="btn btn-primary" id="btnApproveSave">確定核准</button>
  </div>
</div></div>

<div class="toast" id="toast"></div>
<div class="footer">竹建瓦斯 · 會議追蹤系統 · 資料儲存於 Google Sheets</div>

/* ===== 後端通訊 ===== */
async function apiList(){
  if(!GAS){document.getElementById("tableArea").innerHTML='<div class="loading">請先在上方貼入後端網址並連線…</div>';return;}
  document.getElementById("tableArea").innerHTML='<div class="loading"><div class="spinner"></div>資料更新中，再等一下下…<div class="hint">系統正在跟雲端同步，請稍候</div></div>';

async function apiPost(payload){

/* ===== 狀態判定 ===== */
function statusOf(r){
  if(!r.people.length && !r.occ) return "待歸檔";
  if(!r.occ) return "待指派";
  if(r.occ==="免報告") return "免報告";
  if(r.reported) return "已報告";
  if(!r.approved) return "待核准";
  if(r.reportDate && r.reportDate<new Date().toISOString().slice(0,10)) return "逾期";
  return "已核准";
}
const STATUS_TAG={"待歸檔":"tag-wait","待指派":"tag-archived","待核准":"tag-pending","已核准":"tag-assigned","已報告":"tag-done","逾期":"tag-overdue","免報告":"tag-none"};
const ROLE_HINT={
 admin:"📥 管理部視角：你負責「收文建檔」、公文歸檔後「補登參加人員」，可編輯／刪除／拆分／匯入。",
 manager:"👔 部門主管視角：可看全部門進度，對事件指派報告、標記已報告、補改參加人員（不能刪除）。",
 boss:"👁 總經理視角：檢視全部門進度；對主管已指派「待核准」的報告，可「同意」或「改期」核准。"
};

/* ===== UI 初始化 ===== */
function initSelects(){
  const fd=document.getElementById("f_dept");DEPTS.forEach(d=>fd.insertAdjacentHTML("beforeend",`<option>${d}</option>`));
  const ff=document.getElementById("fDept");DEPTS.forEach(d=>ff.insertAdjacentHTML("beforeend",`<option>${d}</option>`));
}
function peopleChecklist(cid,checked){
  const box=document.getElementById(cid);box.innerHTML="";
  DEPTS.forEach(dep=>{
    const list=STAFF.filter(s=>s.dept===dep);if(!list.length)return;
    box.insertAdjacentHTML("beforeend",`<div class="dept-h">${dep}</div>`);
    list.forEach(s=>{
      const ck=checked&&checked.includes(s.name)?"checked":"";
      const role=DEPT_HEAD[s.dept]===s.name?" ⭐主管":"";
      box.insertAdjacentHTML("beforeend",`<label><input type="checkbox" value="${s.name}" ${ck}> ${s.name} <span class="muted">${s.sub?s.sub+" ":""}${s.title}${role}</span></label>`);
    });
  });
}
function getChecked(cid){return [...document.querySelectorAll(`#${cid} input:checked`)].map(i=>i.value);}

/* ===== 渲染 ===== */
function render(){
  document.getElementById("roleHint").innerHTML=ROLE_HINT[ROLE];
  const all=DATA;
  const cnt=s=>all.filter(r=>statusOf(r)===s).length;
  const stats=[
    {l:"總事件數",n:all.length,c:"brand"},{l:"待指派",n:cnt("待指派"),c:"accent"},
    {l:"待核准",n:cnt("待核准"),c:"accent"},{l:"已核准待報告",n:cnt("已核准"),c:"brand"},
    {l:"逾期未報",n:cnt("逾期"),c:"warn"},{l:"已完成",n:cnt("已報告"),c:"ok"}];
  document.getElementById("stats").innerHTML=stats.map(s=>`<div class="stat ${s.c}"><div class="n">${s.n}</div><div class="l">${s.l}</div></div>`).join("");

  const q=document.getElementById("search").value.trim();
  const fdept=document.getElementById("fDept").value;
  const fstat=document.getElementById("fStatus").value;
  let rows=all.filter(r=>{
    if(fdept&&r.dept!==fdept)return false;
    if(fstat&&statusOf(r)!==fstat)return false;
    if(q&&!(`${r.name} ${r.no} ${r.org}`).includes(q))return false;
    return true;
  }).sort((a,b)=>{
    // 依會議日期排序：早的在上（5月→6月→7月），沒填日期的排最後
    const da=(a.date||"").trim(), db=(b.date||"").trim();
    if(!da && !db) return 0;
    if(!da) return 1;
    if(!db) return -1;
    return da.localeCompare(db);
  });

  const area=document.getElementById("tableArea");
  if(!rows.length){area.innerHTML=`<div class="empty"><div class="big">目前沒有符合條件的紀錄</div><div>按「收文建檔」新增第一筆。</div></div>`;return;}

  const isAdmin=ROLE==="admin"&&adminUnlocked;
  const isMgr=ROLE==="manager";
  const isBoss=ROLE==="boss";
  const showAct=isAdmin||isMgr||isBoss;
  area.innerHTML=`<table><thead><tr>
    <th>狀態</th><th>會議／訓練名稱</th><th class="hide-sm">承辦部門</th><th>參加人員</th>
    <th>報告場合</th><th class="hide-sm">預計報告日</th>${showAct?"<th>操作</th>":""}
  </tr></thead><tbody>${rows.map(r=>{
    const st=statusOf(r);
    const people=r.people.length?`<div class="namebox">${r.people.map(n=>`<span class="chip">${n}</span>`).join("")}</div>`:`<span class="muted">—</span>`;
    const occ=r.occ?`<span>${r.occ}</span>${r.reporters.length?`<div class="occ">報告人：${r.reporters.join("、")}</div>`:""}`:`<span class="muted">未指派</span>`;
    let act="";
    if(isAdmin){
      act+=`<button class="btn btn-ghost btn-sm" onclick="openEdit('${r.id}')">編輯</button>`;
      const crossDept=[...new Set(r.people.map(deptOf).filter(Boolean))];
      if(crossDept.length>1) act+=`<button class="btn btn-ghost btn-sm" onclick="splitDept('${r.id}')">📑 拆分部門</button>`;
      act+=`<button class="btn btn-danger btn-sm" onclick="delRow('${r.id}')">刪除</button>`;
    }
    if(isMgr){
      act+=`<button class="btn btn-primary btn-sm" onclick="openAssign('${r.id}')">指派</button>`;
      const future = !r.date || r.date >= new Date().toISOString().slice(0,10);
      if(future) act+=`<button class="btn btn-ghost btn-sm" onclick="openEdit('${r.id}')">改參加人員</button>`;
      if(r.occ&&r.occ!=="免報告"&&r.approved&&!r.reported) act+=`<button class="btn btn-ghost btn-sm" onclick="markReported('${r.id}')">標記已報告</button>`;
    }
    if(isBoss){
      if(st==="待核准"){
        act+=`<button class="btn btn-primary btn-sm" onclick="approveDirect('${r.id}')">✔ 同意</button>`;
        act+=`<button class="btn btn-ghost btn-sm" onclick="openApprove('${r.id}')">改期核准</button>`;
      }
    }
    const occApproved = r.approved&&r.occ&&r.occ!=="免報告"?`<div class="occ" style="color:#2e7d52">✔ 總經理已核准</div>`:"";
    return `<tr>
      <td data-label="狀態"><span class="tag ${STATUS_TAG[st]}">${st}</span></td>
      <td data-label="會議"><b>${r.name}</b><div class="occ">${r.type}｜${r.org||"—"}<br>會議日：${r.date||"—"}　文號：${r.no||"—"}</div></td>
      <td data-label="承辦部門" class="hide-sm">${r.dept}<div class="occ">主管：${DEPT_HEAD[r.dept]||"—"}</div></td>
      <td data-label="參加人員">${people}</td><td data-label="報告場合">${occ}${occApproved}</td>
      <td data-label="預計報告日" class="hide-sm">${r.reportDate||'<span class="muted">—</span>'}</td>
      ${showAct?`<td data-label="操作"><div class="actions">${act||'<span class="muted">—</span>'}</div></td>`:""}
    </tr>`;
  }).join("")}</tbody></table>`;
}
function deptOf(name){const s=STAFF.find(x=>x.name===name||x.name.slice(-2)===name||x.name.slice(1)===name);return s?s.dept:"";}

/* ===== 操作 ===== */
function openEdit(id){
  editId=id;const r=id?DATA.find(x=>x.id===id):null;
  document.getElementById("editTitle").textContent=r?"編輯事件":"收文建檔";
  document.getElementById("f_recv").value=r?r.recv:new Date().toISOString().slice(0,10);
  document.getElementById("f_no").value=r?r.no:"";
  document.getElementById("f_name").value=r?r.name:"";
  document.getElementById("f_org").value=r?r.org:"";
  document.getElementById("f_date").value=r?r.date:"";
  document.getElementById("f_dept").value=r?r.dept:DEPTS[0];
  document.getElementById("f_type").value=r?r.type:"會議";
  document.getElementById("f_note").value=r?r.note:"";
  peopleChecklist("f_people",r?r.people:[]);
  openModal("maskEdit");
}
document.getElementById("btnSave").onclick=async()=>{
  const name=document.getElementById("f_name").value.trim();
  const recv=document.getElementById("f_recv").value;
  if(!name||!recv){alert("請填寫「收文日期」與「會議名稱」");return;}
  const obj={recv,no:document.getElementById("f_no").value.trim(),name,
    org:document.getElementById("f_org").value.trim(),date:document.getElementById("f_date").value,
    dept:document.getElementById("f_dept").value,type:document.getElementById("f_type").value,
    people:getChecked("f_people"),note:document.getElementById("f_note").value.trim()};
  if(editId){
    const r=DATA.find(x=>x.id===editId);
    obj.id=editId;obj.occ=r.occ;obj.reporters=r.reporters;obj.reportDate=r.reportDate;obj.reported=r.reported;
    await apiPost(Object.assign({action:"update"},obj));
  }else{
    await apiPost(Object.assign({action:"add"},obj));
  }
  closeModal("maskEdit");toast("已儲存");apiList();
};
async function delRow(id){
  const r=DATA.find(x=>x.id===id);
  if(!confirm(`確定刪除「${r.name}」這筆紀錄？此動作無法復原。`))return;
  await apiPost({action:"delete",id});toast("已刪除");apiList();
}
function toggleAssignDetail(){
  const occ=document.getElementById("a_occ").value;
  document.getElementById("a_detail").style.display=(occ==="免報告")?"none":"";
}
function openAssign(id){
  assignId=id;const r=DATA.find(x=>x.id===id);
  document.getElementById("assignSub").textContent=`${r.name}（承辦：${r.dept}　主管：${DEPT_HEAD[r.dept]}）`;
  document.getElementById("a_occ").value=r.occ||"免報告";
  document.getElementById("a_date").value=r.reportDate||"";
  const box=document.getElementById("a_people");
  const pool=r.people.length?r.people:STAFF.map(s=>s.name);
  box.innerHTML=`<div class="dept-h">${r.people.length?"參加人員":"全體名冊"}</div>`+
    pool.map(n=>`<label><input type="checkbox" value="${n}" ${r.reporters.includes(n)?"checked":""}> ${n}</label>`).join("");
  toggleAssignDetail();
  openModal("maskAssign");
}
document.getElementById("a_occ").onchange=toggleAssignDetail;
document.getElementById("btnAssignSave").onclick=async()=>{
  const occ=document.getElementById("a_occ").value;
  const reporters=[...document.querySelectorAll("#a_people input:checked")].map(i=>i.value);
  const reportDate=document.getElementById("a_date").value;
  closeModal("maskAssign");toast("儲存中…");
  await apiPost({action:"assign",id:assignId,occ,
    reporters:occ==="免報告"?[]:reporters,reportDate:occ==="免報告"?"":reportDate,
    approved:occ==="免報告"?true:false});
  toast("已送出，等候總經理核准");apiList();
};
async function markReported(id){await apiPost({action:"reported",id});toast("已標記報告完成");apiList();}

/* ===== 總經理核准 ===== */
async function approveDirect(id){
  await apiPost({action:"approve",id});toast("已同意核准");apiList();
}
function openApprove(id){
  assignId=id;const r=DATA.find(x=>x.id===id);
  document.getElementById("apvSub").textContent=`${r.name}（主管排定：${r.reportDate||"未填"}）`;
  document.getElementById("apv_date").value=r.reportDate||"";
  openModal("maskApprove");
}
document.getElementById("btnApproveSave").onclick=async()=>{
  const newDate=document.getElementById("apv_date").value;
  closeModal("maskApprove");toast("核准中…");
  await apiPost({action:"approve",id:assignId,reportDate:newDate});
  toast("已核准");apiList();
};

/* ===== CSV ===== */
document.getElementById("btnExport").onclick=()=>{
  const head=["狀態","收文日期","文號","名稱","類別","主辦單位","會議日期","承辦部門","部門主管","參加人員","報告場合","報告人","預計報告日","備註"];
  const lines=DATA.map(r=>[statusOf(r),r.recv,r.no,r.name,r.type,r.org,r.date,r.dept,DEPT_HEAD[r.dept]||"",r.people.join("、"),r.occ||"",r.reporters.join("、"),r.reportDate||"",r.note||""]
    .map(v=>`"${(v||"").toString().replace(/"/g,'""')}"`).join(","));
  const csv="\uFEFF"+[head.join(","),...lines].join("\n");
  const a=document.createElement("a");a.href=URL.createObjectURL(new Blob([csv],{type:"text/csv"}));
  a.download="會議追蹤_"+new Date().toISOString().slice(0,10)+".csv";a.click();
};

/* ===== 拆分部門 ===== */
async function splitDept(id){
  const r=DATA.find(x=>x.id===id);
  const groups={};
  r.people.forEach(n=>{const d=deptOf(n)||r.dept;(groups[d]=groups[d]||[]).push(n);});
  const depts=Object.keys(groups);
  if(depts.length<2){alert("這筆參加人員都同一個部門，不需拆分。");return;}
  if(!confirm(`「${r.name}」將依參加人員拆成 ${depts.length} 筆（${depts.join("、")}），每個部門各一筆獨立追蹤。\n\n原本這筆會被刪除，確定？`))return;
  toast("拆分中…");
  const rows=depts.map(d=>({recv:r.recv,no:r.no,name:r.name,type:r.type,org:r.org,
    date:r.date,dept:d,people:groups[d],note:(r.note?r.note+" ":"")+"（拆分自跨部門）"}));
  await apiPost({action:"addBatch",rows});
  await apiPost({action:"delete",id});
  toast(`已拆成 ${depts.length} 筆`);apiList();
}

/* ===== modal ===== */
function openModal(id){document.getElementById(id).classList.add("show");}
function closeModal(id){document.getElementById(id).classList.remove("show");}

/* ===== 綁定 ===== */
document.getElementById("btnNew").onclick=()=>{if(!GAS){alert("請先連線後端");return;}openEdit(null);};
document.getElementById("btnReload").onclick=apiList;
document.getElementById("btnImport").onclick=async()=>{
  if(!GAS){alert("請先連線後端");return;}
  // 依現有資料的「名稱+會議日期」過濾掉已存在的，避免重複匯入
  const exist=new Set(DATA.map(r=>r.name+"|"+r.date));
  const todo=CAL_IMPORT.filter(r=>!exist.has(r.name+"|"+r.date));
  if(!todo.length){alert("行事曆行程都已經匯入過了，沒有新的可加。");return;}
  const today=new Date().toISOString().slice(0,10);
  const rows=todo.map(r=>({recv:today,no:"",name:r.name,type:r.type,org:"",
    date:r.date,dept:r.dept,people:r.people,note:"行事曆匯入"}));
  if(!confirm(`將匯入 ${rows.length} 筆行事曆行程到系統，確定？`))return;
  toast("匯入中…");
  await apiPost({action:"addBatch",rows});
  toast(`已匯入 ${rows.length} 筆`);apiList();
};
document.getElementById("search").oninput=render;
document.getElementById("fDept").onchange=render;
document.getElementById("fStatus").onchange=render;
document.getElementById("btnSaveUrl").onclick=()=>{
  GAS=document.getElementById("gasUrl").value.trim();
  localStorage.setItem(URLKEY,GAS);toast("已儲存後端網址");apiList();
};
function applyRoleUI(){
  const adminTools=ROLE==="admin"&&adminUnlocked;
  document.getElementById("btnNew").style.display=adminTools?"":"none";
  document.getElementById("btnImport").style.display=adminTools?"":"none";
}
document.querySelectorAll("#roleSwitch button").forEach(b=>{
  b.onclick=()=>{
    const role=b.dataset.role;
    if(role==="admin"&&!adminUnlocked){
      const pw=prompt("請輸入管理部密碼：");
      if(pw!==ADMIN_PW){if(pw!==null)alert("密碼錯誤");return;}
      adminUnlocked=true;
    }
    document.querySelectorAll("#roleSwitch button").forEach(x=>x.classList.remove("active"));
    b.classList.add("active");ROLE=role;
    applyRoleUI();render();
  };
});

initSelects();
// 後端網址已內建，隱藏設定列；預設「總經理」唯讀開場
document.getElementById("cfgbar").style.display="none";
document.querySelectorAll("#roleSwitch button").forEach(x=>x.classList.remove("active"));
document.querySelector('#roleSwitch button[data-role="boss"]').classList.add("active");
ROLE="boss";applyRoleUI();
if(GAS){apiList();}
</script>
</body>
</html>
