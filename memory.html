<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>步驟配對遊戲 — 竹建學習網</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:"Microsoft JhengHei","微軟正黑體",sans-serif;background:#1c1c1e;font-size:20px;}
.header{background:#2c2c2e;border-bottom:2px solid #FFD60A;padding:0.8rem 1.5rem;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50;}
.back-btn{background:#3a3a3c;border:none;padding:8px 18px;border-radius:20px;font-size:20px;cursor:pointer;color:#9a9a9a;font-family:inherit;}
.htitle{font-size:20px;font-weight:700;color:#d4a843;}
.htitle span{color:#FF8C00;}
.game{padding:1rem;max-width:700px;margin:0 auto;}
.top-bar{background:#2c2c2e;border-radius:14px;padding:1rem 1.5rem;margin-bottom:1rem;border:1.5px solid #3a3a3c;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;}
.timer{font-size:2.2rem;font-weight:700;color:#d4a843;font-variant-numeric:tabular-nums;}
.timer.run{color:#FF8C00;}
.score{font-size:1.4rem;font-weight:700;color:#d4a843;}
.score-label{font-size:20px;color:#606060;}
.btns{display:flex;gap:8px;}
.btn{padding:10px 18px;border:none;border-radius:20px;font-size:20px;font-weight:700;font-family:inherit;cursor:pointer;}
.btn-start{background:#3a3a3c;color:#d4a843;}
.btn-start:disabled{background:#ccc;cursor:not-allowed;}
.btn-reset{background:#2c2c2e;color:#707070;border:2px solid #ddd;}
.hint{background:#fff3e0;border-left:4px solid #FFB830;border-radius:0 10px 10px 0;padding:0.8rem 1rem;margin-bottom:1rem;font-size:20px;color:#7a5c00;line-height:1.6;}
.progress-bar{height:8px;background:#e8e8e8;border-radius:4px;margin-bottom:1rem;overflow:hidden;}
.progress-fill{height:100%;background:linear-gradient(90deg,#2d8a42,#4ade80);border-radius:4px;transition:width 0.4s;}
.board{display:grid;grid-template-columns:repeat(7,1fr);gap:8px;margin-bottom:1rem;}
.card-wrap{perspective:600px;aspect-ratio:3/4;cursor:pointer;}
.card-inner{position:relative;width:100%;height:100%;transform-style:preserve-3d;transition:transform 0.5s;}
.card-wrap.flipped .card-inner,.card-wrap.matched .card-inner{transform:rotateY(180deg);}
.card-front,.card-back{position:absolute;inset:0;border-radius:10px;backface-visibility:hidden;display:flex;align-items:center;justify-content:center;}
.card-front{background:linear-gradient(135deg,#7b1a1a,#c0392b);border:2px solid #7b1a1a;}
.card-front img{width:75%;height:75%;object-fit:contain;}
.card-back{transform:rotateY(180deg);border:1.5px solid #3a3a3c;background:#2c2c2e;flex-direction:column;gap:6px;padding:6px;}
.card-back.photo img{width:100%;height:100%;object-fit:cover;border-radius:8px;}
.card-back.text{padding:8px;text-align:center;overflow:hidden;}
.card-back.text .step-label{font-size:17px;font-weight:700;color:#d4a843;margin-bottom:4px;}
.card-back.text .step-desc{font-size:10px;color:#9a9a9a;line-height:1.5;}
.card-wrap.matched .card-back{border-color:#d4a843;background:#e8f5ec;}
.card-wrap.wrong .card-inner{animation:shake 0.4s;}
@keyframes shake{0%,100%{transform:rotateY(180deg)}25%{transform:rotateY(180deg) translateX(-4px)}75%{transform:rotateY(180deg) translateX(4px)}}
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:200;align-items:center;justify-content:center;}
.overlay.show{display:flex;}
.box{background:#2c2c2e;border-radius:20px;padding:2rem;text-align:center;max-width:300px;width:90%;}
.box-time{font-size:2.4rem;font-weight:700;color:#FF8C00;margin:8px 0;}
.box-msg{font-size:20px;color:#8a8a8a;margin-bottom:1.2rem;}
.box-btn{background:#3a3a3c;color:#d4a843;border:none;padding:12px 28px;border-radius:20px;font-size:17px;font-weight:700;font-family:inherit;cursor:pointer;}
footer{background:#2c2c2e;color:#606060;border-top:1px solid #3a3a3c;text-align:center;padding:1.2rem;font-size:17px;margin-top:1rem;}

/* ===== RWD 手機版 ===== */
@media(max-width:600px){
  /* 首頁 */
  .hero-title{font-size:2.5rem !important;}
  .hero-sub{font-size:15px !important;}
  .login-box{padding:1.2rem !important;}
  .cards-grid{grid-template-columns:repeat(2,1fr) !important;}
  .sched-date{min-width:80px !important;font-size:13px !important;}

  /* Nav */
  .nav{padding:0 1rem !important;}
  .brand-name{font-size:16px !important;}
  .brand-tag{display:none !important;}
  .nav-btn{padding:7px 14px !important;font-size:13px !important;}

  /* home */
  .banner-name{font-size:24px !important;}
  .banner-msg{font-size:15px !important;}
  .prog-row{grid-template-columns:1fr 1fr !important;}
  .prog-num{font-size:1.5rem !important;}
  .countdown-grid{grid-template-columns:1fr 1fr !important;}
  .cd-num{font-size:2.2rem !important;}
  .cd-label{font-size:15px !important;}
  .cd-date{font-size:13px !important;}
  .cards-grid{grid-template-columns:1fr 1fr !important;}
  .card-name{font-size:15px !important;}
  .card-sub{font-size:12px !important;}
  .enc-text{font-size:14px !important;}

  /* videos */
  .video-top{flex-direction:column !important;}
  .video-embed{width:100% !important;}
  .video-embed iframe{width:100% !important;height:200px !important;}
  .overall-progress{flex-direction:column !important;gap:0.8rem !important;}
  .section-count{display:none !important;}

  /* admin */
  .stats-grid{grid-template-columns:repeat(2,1fr) !important;}
  .tabs{flex-wrap:wrap !important;}
  .tab{font-size:13px !important;padding:8px 6px !important;}
  table{font-size:13px !important;}
  th,td{padding:8px 6px !important;}

  /* games */
  .games-grid{grid-template-columns:1fr !important;}

  /* progress */
  .stats-grid{grid-template-columns:repeat(3,1fr) !important;}
  .stat-num{font-size:1.5rem !important;}

  /* header */
  .header{padding:0.8rem 1rem !important;}
  .htitle{font-size:17px !important;}
  .back-btn{padding:7px 12px !important;font-size:13px !important;}

  /* game */
  .drop-row{gap:4px !important;}
  .slot{min-height:55px !important;}
  .board{gap:5px !important;grid-template-columns:repeat(4,1fr) !important;}
  .card-back.text .step-label{font-size:11px !important;}
  .card-back.text .step-desc{font-size:9px !important;line-height:1.4 !important;}
  .card-back.text{padding:5px !important;overflow:hidden !important;}
  .card-back.photo img{width:100% !important;height:100% !important;}

  /* 通用 */
  .page{padding:1rem !important;}
  .game{padding:0.8rem !important;}
  .section-title{font-size:15px !important;}
  footer{font-size:12px !important;padding:1rem !important;}
}
</style>
</head>
<body>
<div class="header">
  <button class="back-btn" onclick="location.href='games.html'">← 返回</button>
  <div class="htitle">🃏 步驟配對<span>翻牌遊戲</span></div>
</div>
<div class="game">
  <div class="top-bar">
    <div>
      <div style="font-size:20px;color:#606060;margin-bottom:2px;">計時</div>
      <div class="timer" id="tmr">00:00</div>
    </div>
    <div style="text-align:center;">
      <div class="score-label">配對成功</div>
      <div class="score"><span id="matchCount">0</span> / 7</div>
    </div>
    <div class="btns">
      <button class="btn btn-reset" onclick="resetGame()">重置</button>
      <button class="btn btn-start" id="startBtn" onclick="startGame()">▶ 開始</button>
    </div>
  </div>
  <div class="hint" id="hint">翻開<strong>零件照片</strong>，找到對應的<strong>步驟說明</strong>配對！全部7組配對完成就算過關！</div>
  <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
  <div class="board" id="board"></div>
</div>
<footer>竹建瓦斯股份有限公司 | 乙級導管配管培訓課程</footer>
<div class="overlay" id="doneOverlay">
  <div class="box">
    <div style="font-size:44px;">🎉</div>
    <div style="font-size:20px;font-weight:700;margin:8px 0;color:#d4a843;">全部配對成功！</div>
    <div class="box-time" id="doneTime">00:00</div>
    <div class="box-msg" id="doneMsg"></div>
    <button class="box-btn" onclick="resetGame()">再挑戰一次</button>
  </div>
</div>

let started=false,sec=0,iv=null,matched=0,flipped=[],canFlip=true;

function fmt(s){return String(Math.floor(s/60)).padStart(2,'0')+':'+String(s%60).padStart(2,'0');}
function shuffle(a){const b=[...a];for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]];}return b;}

function buildBoard(){
  const board=document.getElementById('board');board.innerHTML='';
  const photoCards=PHOTOS.map((p,i)=>({type:'photo',id:i,src:p.src,step:p.step}));
  const textCards=PHOTOS.map((p,i)=>({type:'text',id:i,step:p.step,desc:p.desc}));
  const cards=shuffle([...photoCards,...textCards]);
  cards.forEach((card)=>{
    const wrap=document.createElement('div');wrap.className='card-wrap';
    let back='';
    if(card.type==='photo'){
      back='<div class="card-back photo"><img src="'+card.src+'" alt="'+card.step+'"/></div>';
    }else{
      back='<div class="card-back text"><div class="step-label">'+card.step+'</div><div class="step-desc">'+card.desc+'</div></div>';
    }
    wrap.innerHTML='<div class="card-inner"><div class="card-front"><img src="'+STAR_SRC+'" alt="?"/></div>'+back+'</div>';
    wrap.addEventListener('click',()=>flipCard(wrap,card));
    board.appendChild(wrap);
  });
}

function flipCard(wrap,card){
  if(!started||!canFlip)return;
  if(wrap.classList.contains('flipped')||wrap.classList.contains('matched'))return;
  if(flipped.length>=2)return;
  wrap.classList.add('flipped');
  flipped.push({wrap,card});
  if(flipped.length===2){
    canFlip=false;
    const [a,b]=flipped;
    if(a.card.id===b.card.id&&a.card.type!==b.card.type){
      setTimeout(()=>{
        a.wrap.classList.add('matched');b.wrap.classList.add('matched');
        matched++;
        document.getElementById('matchCount').textContent=matched;
        document.getElementById('progressFill').style.width=(matched/7*100)+'%';
        document.getElementById('hint').textContent='配對成功！還剩'+(7-matched)+'組！';
        flipped=[];canFlip=true;
        if(matched===7){
          clearInterval(iv);started=false;
          document.getElementById('doneTime').textContent=fmt(sec);
          document.getElementById('doneMsg').textContent=sec<60?'超級神速！天才！':sec<120?'非常厲害！':'答對了！繼續加油！';
          document.getElementById('doneOverlay').classList.add('show');
        }
      },300);
    }else{
      setTimeout(()=>{
        a.wrap.classList.add('wrong');b.wrap.classList.add('wrong');
        setTimeout(()=>{
          a.wrap.classList.remove('flipped','wrong');b.wrap.classList.remove('flipped','wrong');
          flipped=[];canFlip=true;
          document.getElementById('hint').textContent='不對！再試試看！';
        },600);
      },500);
    }
  }
}

function startGame(){
  started=true;sec=0;
  document.getElementById('startBtn').disabled=true;
  document.getElementById('tmr').classList.add('run');
  iv=setInterval(()=>{sec++;document.getElementById('tmr').textContent=fmt(sec);},1000);
  document.getElementById('hint').textContent='翻開照片找對應的步驟說明！加油！';
}

function resetGame(){
  clearInterval(iv);started=false;sec=0;matched=0;flipped=[];canFlip=true;
  document.getElementById('tmr').textContent='00:00';
  document.getElementById('tmr').classList.remove('run');
  document.getElementById('startBtn').disabled=false;
  document.getElementById('matchCount').textContent='0';
  document.getElementById('progressFill').style.width='0%';
  document.getElementById('hint').textContent='翻開零件照片，找到對應的步驟說明配對！全部7組配對完成就算過關！';
  document.getElementById('doneOverlay').classList.remove('show');
  buildBoard();
}

buildBoard();
</script>
