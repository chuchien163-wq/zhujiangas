function buildTabs(){
  const w=document.getElementById("tabs");
  TOURS.forEach((t,i)=>{
    const isAu=t.dest==="澳洲";
    const b=document.createElement("button");
    b.className="tb"+(i===0?" "+(isAu?"au":"jp"):"");
    b.dataset.i=i;
    b.innerHTML=`<span class="td" style="background:${isAu?"#1D9E75":"#7F77DD"}"></span>${t.label}<span style="font-size:10px;opacity:.6;margin-left:3px">${t.days}</span>`;
    b.onclick=()=>sw(i);
    w.appendChild(b);
  });
}

function buildContent(){
  const ct=document.getElementById("ct");
  TOURS.forEach((t,i)=>{
    const isAu=t.dest==="澳洲";
    const p=document.createElement("div");
    p.className="pane"+(i===0?" on":"");
    p.id="p"+i;
    let h=`<div class="th"><div class="tt">${t.label}</div>
    <div class="tm">
      <span style="color:${isAu?"var(--au)":"var(--jp)"};font-weight:600">${t.dest}</span>
      <span>📋 ${t.agency}</span><span>📅 ${t.days}</span>
      <span>✈ ${t.airline}</span><span>💰 ${t.price}</span>
      <span>🗺 ${t.cities}</span>
    </div></div>`;
    if(t.warn) h+=`<div class="warn">${t.warn}</div>`;
    t.dd.forEach(d=>{
      let rows=d.routes.map(r=>`<tr>
        <td class="ft">${r.f}<span class="ar">→</span>${r.t}</td>
        <td><span class="bx ${r.tp}">${L[r.tp]||r.tp}</span></td>
        <td><span class="tv">${r.time}</span></td>
        <td><span class="dv">${r.dist}</span></td>
        <td class="nc">${r.note}</td>
      </tr>`).join("");
      h+=`<div class="ds"><div class="dl">${d.day}　${d.title}</div>
      <table class="rt"><thead><tr>
        <th style="width:32%">路段（出發 → 抵達）</th>
        <th style="width:16%">交通方式</th>
        <th style="width:12%">時間</th>
        <th style="width:10%">距離</th>
        <th>備註・餐食</th>
      </tr></thead><tbody>${rows}</tbody></table></div>`;
    });
    p.innerHTML=h;
    ct.appendChild(p);
  });
}

function sw(idx){
  document.querySelectorAll(".tb").forEach((b,i)=>{
    b.className="tb"+(i===idx?" "+(TOURS[idx].dest==="澳洲"?"au":"jp"):"");
  });
  document.querySelectorAll(".pane").forEach((p,i)=>{
    p.className="pane"+(i===idx?" on":"");
  });
}

buildTabs();
buildContent();
</script>
