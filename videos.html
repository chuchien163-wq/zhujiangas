<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>訓練影片 — 竹建學習網</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:"Microsoft JhengHei","微軟正黑體","Noto Sans TC",sans-serif;background:#1c1c1e;color:#e0e0e0;}
.wrap{display:flex;min-height:100vh;}

/* 側欄 */
.sidebar{width:200px;background:#111;border-right:1px solid #2a2a2a;padding:1.2rem 0;flex-shrink:0;position:sticky;top:0;height:100vh;display:flex;flex-direction:column;}
.sb-logo{padding:0 1rem 1.2rem;border-bottom:1px solid #2a2a2a;margin-bottom:1rem;display:flex;align-items:center;gap:8px;}
.sb-brand{font-size:15px;font-weight:700;color:#FFD60A;letter-spacing:1px;}
.sb-sub{font-size:12px;color:#aaa;margin-top:2px;}
.sb-section{font-size:12px;color:#aaa;font-weight:700;letter-spacing:1px;padding:0 1rem;margin:1rem 0 0.4rem;}
.sb-item{display:flex;align-items:center;gap:10px;padding:0.6rem 1rem;font-size:15px;color:#ccc;cursor:pointer;border-left:3px solid transparent;transition:all 0.15s;text-decoration:none;}
.sb-item:hover{background:#1c1c1e;color:#fff;}
.sb-item.active{background:#1c1c1e;color:#FFD60A;border-left-color:#FFD60A;font-weight:700;}
.sb-icon{font-size:16px;width:20px;text-align:center;flex-shrink:0;}
.sb-flex{flex:1;}
.sb-user{padding:1rem;border-top:1px solid #2a2a2a;display:flex;align-items:center;gap:8px;}
.sb-av{width:34px;height:34px;border-radius:50%;background:#FFD60A;color:#000;font-size:14px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.sb-uname{font-size:13px;font-weight:700;color:#e0e0e0;}
.sb-role{font-size:11px;color:#777;}
.sb-logout{background:transparent;border:none;color:#666;font-size:11px;cursor:pointer;font-family:inherit;padding:0;margin-top:2px;}
.sb-logout:hover{color:#ff453a;}

/* 主區 */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;max-width:calc(100% - 200px);}

/* 分類Bar */
.cat-bar{background:#2c2c2e;border-bottom:1px solid #3a3a3c;padding:1rem 1.5rem;display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
.cat-btn{padding:8px 18px;border-radius:20px;border:1.5px solid #3a3a3c;background:transparent;color:#ccc;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;transition:all 0.15s;}
.cat-btn.active{background:#FFD60A;color:#000;border-color:#FFD60A;}
.cat-btn:hover:not(.active){border-color:#FFD60A;color:#FFD60A;}
.prog-text{font-size:14px;color:#aaa;margin-left:auto;}
.prog-text span{color:#bf5af2;font-weight:700;}

/* 影片列表 */
.video-content{flex:1;overflow-y:auto;padding:1rem 1.5rem;}
.video-item{background:#2c2c2e;border:1.5px solid #3a3a3c;border-radius:12px;padding:1rem;margin-bottom:10px;display:flex;gap:14px;align-items:flex-start;transition:border-color 0.15s;}
.video-item:hover{border-color:#FFD60A;}
.video-item.watched{border-color:#bf5af2;}
.v-thumb{width:140px;height:80px;border-radius:8px;background:#3a3a3c;flex-shrink:0;overflow:hidden;position:relative;cursor:pointer;}
.v-thumb img{width:100%;height:100%;object-fit:cover;}
.v-play-overlay{position:absolute;inset:0;background:rgba(0,0,0,0.4);display:flex;align-items:center;justify-content:center;font-size:28px;transition:background 0.15s;}
.v-thumb:hover .v-play-overlay{background:rgba(0,0,0,0.2);}
.v-info{flex:1;min-width:0;}
.v-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:4px;}
.v-num{font-size:12px;color:#aaa;font-weight:700;}
.v-check{font-size:16px;color:#bf5af2;font-weight:700;}
.v-name{font-size:16px;font-weight:700;color:#fff;margin-bottom:4px;}
.v-date{font-size:13px;color:#777;margin-bottom:10px;}
.btn-done{padding:7px 18px;border-radius:6px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;border:1.5px solid;transition:all 0.15s;}
.btn-watched{background:transparent;color:#bf5af2;border-color:#bf5af2;}
.btn-unwatched{background:transparent;color:#ccc;border-color:#3a3a3c;}
.btn-unwatched:hover{border-color:#FFD60A;color:#FFD60A;}

/* 影片播放彈窗 */
.modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.92);z-index:200;align-items:center;justify-content:center;flex-direction:column;}
.modal.show{display:flex;}
.modal-close{position:absolute;top:1rem;right:1.5rem;color:#fff;font-size:28px;cursor:pointer;background:none;border:none;}
.modal-video{width:90vw;max-width:800px;aspect-ratio:16/9;border-radius:10px;overflow:hidden;}
.modal-video iframe{width:100%;height:100%;border:none;}
.modal-title{color:#fff;font-size:16px;font-weight:700;margin-top:1rem;}

@media(max-width:700px){
  .sidebar{display:none;}
  .main{max-width:100%;}
  .v-thumb{width:100px;height:58px;}
  .cat-bar{padding:0.8rem 1rem;}
  .cat-btn{font-size:13px;padding:6px 14px;}
  .video-content{padding:0.8rem 1rem;}
}
</style>
</head>

      <button class="cat-btn" onclick="filterVid('424',this)">📅 4/24 上課（7部）</button>

  </div>

</div>

<script>
(function(){const u=sessionStorage.getItem('user');if(!u)window.location.href='index.html';})();
const user=JSON.parse(sessionStorage.getItem('user')||'{}');
document.getElementById('sbAv').textContent=user.name?user.name[0]:'?';
document.getElementById('sbName').textContent=user.name||'訪客';
document.getElementById('sbRole').textContent=user.isAdmin?'管理者':'學員';

const VIDEOS=[{"no": "01", "name": "1150317-01", "url": "https://youtu.be/SrgsYD3dFMM", "cat": "317", "date": "115/03/17"}, {"no": "02", "name": "1150317-02", "url": "https://youtu.be/Sv75VPYGHSk", "cat": "317", "date": "115/03/17"}, {"no": "03", "name": "1150317-03", "url": "https://youtu.be/L_E5QMMEnGs", "cat": "317", "date": "115/03/17"}, {"no": "04", "name": "1150317-04", "url": "https://youtu.be/uGOVCqyGz2k", "cat": "317", "date": "115/03/17"}, {"no": "05", "name": "1150317-05", "url": "https://youtu.be/R5GV9UKWFOw", "cat": "317", "date": "115/03/17"}, {"no": "06", "name": "1150317-06", "url": "https://youtu.be/FpoOq_Z5XvE", "cat": "317", "date": "115/03/17"}, {"no": "07", "name": "1150424-01", "url": "https://youtu.be/sBvazzn_g5M", "cat": "424", "date": "115/04/24"}, {"no": "08", "name": "1150424-02", "url": "https://youtu.be/F0FW94nZMpM", "cat": "424", "date": "115/04/24"}, {"no": "09", "name": "1150424-03", "url": "https://youtu.be/Uwj_bRT6KVo", "cat": "424", "date": "115/04/24"}, {"no": "10", "name": "1150424-04", "url": "https://youtu.be/BGevh9zcyyI", "cat": "424", "date": "115/04/24"}, {"no": "11", "name": "1150424-05", "url": "https://youtu.be/Y8MH45ygubE", "cat": "424", "date": "115/04/24"}, {"no": "12", "name": "1150424-06", "url": "https://youtu.be/7NjWLH8so8Q", "cat": "424", "date": "115/04/24"}, {"no": "13", "name": "1150424-07", "url": "https://youtu.be/VQ8ZYuQXQCU", "cat": "424", "date": "115/04/24"}];
const watchKey='watched_'+user.name;
let watchedSet=new Set(JSON.parse(localStorage.getItem(watchKey)||'[]'));
let curFilter='all';

function updateCount(){
  document.getElementById('doneCount').textContent=watchedSet.size;
}

function saveWatched(no){
  watchedSet.add(no);
  localStorage.setItem(watchKey,JSON.stringify([...watchedSet]));
  updateCount();
}

function getYtId(url){
  const m=url.match(/youtu\.be\/([^?]+)/);
  return m?m[1]:'';
}

function render(){
  const list=document.getElementById('videoList');
  const filtered=curFilter==='all'?VIDEOS:VIDEOS.filter(v=>v.cat===curFilter);
  list.innerHTML='';
  filtered.forEach(v=>{
    const watched=watchedSet.has(v.no);
    const ytId=getYtId(v.url);
    const thumb=`https://img.youtube.com/vi/${ytId}/mqdefault.jpg`;
    const item=document.createElement('div');
    item.className='video-item'+(watched?' watched':'');
    item.innerHTML=`
      <div class="v-thumb" onclick="openModal('${v.url}','${v.name}')">
        <img src="${thumb}" alt="${v.name}" onerror="this.style.display='none'"/>
        <div class="v-play-overlay">▶</div>
      </div>
      <div class="v-info">
        <div class="v-top">
          <div class="v-num">NO. ${v.no}</div>
          <div class="v-check">${watched?'✓':''}</div>
        </div>
        <div class="v-name">${v.name}</div>
        <div class="v-date">📅 ${v.date}</div>
        <button class="btn-done ${watched?'btn-watched':'btn-unwatched'}" id="btn_${v.no}" onclick="markWatched('${v.no}',this)">
          ${watched?'✅ 已看完':'☐ 我已看完此影片'}
        </button>
      </div>`;
    list.appendChild(item);
  });
}

function markWatched(no,btn){
  if(watchedSet.has(no))return;
  saveWatched(no);
  btn.textContent='✅ 已看完';
  btn.className='btn-done btn-watched';
  btn.closest('.video-item').classList.add('watched');
  btn.closest('.video-item').querySelector('.v-check').textContent='✓';
}

function filterVid(cat,btn){
  curFilter=cat;
  document.querySelectorAll('.cat-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  render();
}

function openModal(url,name){
  const ytId=getYtId(url);
  document.getElementById('modalIframe').src=`https://www.youtube.com/embed/${ytId}?autoplay=1&rel=0`;
  document.getElementById('modalTitle').textContent=name;
  document.getElementById('modal').classList.add('show');
}

function closeModal(){
  document.getElementById('modal').classList.remove('show');
  document.getElementById('modalIframe').src='';
}

function logout(){
  if(confirm('確定要登出嗎？')){sessionStorage.removeItem('user');window.location.href='index.html';}
}

updateCount();
render();
</script>
</body>
