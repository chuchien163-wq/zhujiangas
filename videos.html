<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:"Microsoft JhengHei","微軟正黑體","Noto Sans TC",sans-serif;background:#f5f5f0;color:#2c2c2e;}
.wrap{display:flex;min-height:100vh;}
/* 側欄 */
.sidebar{width:200px;background:#fff;border-right:1px solid #e0e0d8;padding:1.2rem 0;flex-shrink:0;position:sticky;top:0;height:100vh;display:flex;flex-direction:column;}
.sb-logo{padding:0 1rem 1.2rem;border-bottom:1px solid #e0e0d8;margin-bottom:1rem;display:flex;align-items:center;gap:8px;}
.sb-brand{font-size:16px;font-weight:700;color:#b87a00;letter-spacing:1px;}
.sb-sub{font-size:13px;color:#999;margin-top:2px;}
.sb-section{font-size:14px;color:#999;font-weight:700;letter-spacing:1px;padding:0 1rem;margin:1rem 0 0.4rem;}
.sb-item{display:flex;align-items:center;gap:10px;padding:0.65rem 1rem;font-size:16px;color:#555;cursor:pointer;border-left:3px solid transparent;transition:all 0.15s;text-decoration:none;}
.sb-item:hover{background:#f0f0ea;color:#2c2c2e;}
.sb-item.active{background:#fff9e6;color:#b87a00;border-left-color:#FFD60A;font-weight:700;}
.sb-icon{font-size:17px;width:22px;text-align:center;flex-shrink:0;}
.sb-flex{flex:1;}
.sb-user{padding:1rem;border-top:1px solid #e0e0d8;display:flex;align-items:center;gap:8px;}
.sb-av{width:36px;height:36px;border-radius:50%;background:#FFD60A;color:#000;font-size:15px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.sb-uname{font-size:15px;font-weight:700;color:#2c2c2e;}
.sb-role{font-size:13px;color:#999;}
/* 主區 */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;}
/* 分類Bar 凍結 */
.cat-bar{background:#fff;border-bottom:1px solid #e8e8e0;padding:1rem 1.5rem;display:flex;align-items:center;gap:10px;flex-wrap:wrap;position:sticky;top:0;z-index:10;box-shadow:0 2px 8px rgba(0,0,0,0.05);}
.cat-btn{padding:8px 18px;border-radius:20px;border:1.5px solid #e0e0d8;background:transparent;color:#555;font-size:20px;font-weight:700;cursor:pointer;font-family:inherit;transition:all 0.15s;}
.cat-btn.active{background:#FFD60A;color:#000;border-color:#FFD60A;}
.cat-btn:hover:not(.active){border-color:#FFD60A;color:#b87a00;}
.prog-text{font-size:15px;color:#888;margin-left:auto;}
.prog-text span{color:#bf5af2;font-weight:700;}
/* 影片格子 */
.video-content{flex:1;padding:1.2rem 1.5rem;overflow-y:auto;background:#f5f5f0;}
.video-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;}
.v-card{background:#fff;border:1.5px solid #e8e8e0;border-radius:12px;overflow:hidden;cursor:pointer;transition:all 0.2s;box-shadow:0 2px 6px rgba(0,0,0,0.04);}
.v-card:hover{border-color:#FFD60A;transform:translateY(-2px);box-shadow:0 6px 16px rgba(0,0,0,0.1);}
.v-card.watched{border-color:#bf5af2;}
.v-thumb{width:100%;aspect-ratio:16/9;background:#e8e8e0;position:relative;overflow:hidden;}
.v-thumb img{width:100%;height:100%;object-fit:cover;display:block;}
.v-play{position:absolute;inset:0;background:rgba(0,0,0,0.3);display:flex;align-items:center;justify-content:center;font-size:28px;opacity:0;transition:opacity 0.2s;}
.v-card:hover .v-play{opacity:1;}
.v-done-mark{position:absolute;top:8px;right:8px;background:#bf5af2;color:#fff;border-radius:50%;width:26px;height:26px;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;}
.v-body{padding:10px 12px 12px;}
.v-num{font-size:13px;color:#888;margin-bottom:3px;font-weight:700;}
.v-name{font-size:15px;font-weight:700;color:#2c2c2e;margin-bottom:4px;line-height:1.4;}
.v-date{font-size:13px;color:#aaa;margin-bottom:6px;}
.v-desc{font-size:13px;color:#888;line-height:1.5;margin-bottom:8px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
.btn-done{width:100%;padding:7px;border-radius:6px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;border:1.5px solid;transition:all 0.15s;}
.btn-watched{background:#f9f0ff;color:#bf5af2;border-color:#bf5af2;}
.btn-unwatched{background:transparent;color:#aaa;border-color:#e0e0d8;}
.btn-unwatched:hover{border-color:#FFD60A;color:#b87a00;}
/* 彈窗 */
.modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.88);z-index:200;align-items:center;justify-content:center;flex-direction:column;}
.modal.show{display:flex;}
.modal-close{position:absolute;top:1rem;right:1.5rem;color:#fff;font-size:28px;cursor:pointer;background:none;border:none;}
.modal-video{width:90vw;max-width:800px;aspect-ratio:16/9;border-radius:10px;overflow:hidden;}
.modal-video iframe{width:100%;height:100%;border:none;}
.modal-title{color:#fff;font-size:16px;font-weight:700;margin-top:1rem;}
@media(max-width:700px){
  .sidebar{display:none;}
  .video-grid{grid-template-columns:repeat(2,1fr);gap:8px;}
  .video-content{padding:0.8rem;}
  .cat-bar{padding:0.8rem 1rem;gap:8px;}
  .cat-btn{padding:6px 14px;}
}
</style>

const GAS_URL='https://script.google.com/macros/s/AKfycbzYOYilJM0lEGcp7-_O0Nn1hG5eUA2OuJBnzA2jCuTC3eFxtdlaux8PeZo4qcERFaFn/exec';
const watchKey='watched_'+user.name;
let watchedSet=new Set(JSON.parse(localStorage.getItem(watchKey)||'[]'));
let curFilter='all';

function updateCount(){document.getElementById('doneCount').textContent=watchedSet.size;}

function saveWatched(no){
  watchedSet.add(no);
  localStorage.setItem(watchKey,JSON.stringify([...watchedSet]));
  updateCount();
  const v=VIDEOS.find(x=>x.no===no);
  fetch(GAS_URL,{method:'POST',body:JSON.stringify({action:'記錄觀看',姓名:user.name||'',工號:user.no||'',影片編號:no,影片名稱:v?v.name:'',完成狀態:'✅ 完成'})}).catch(()=>{});
}

function getYtId(url){const m=url.match(/youtu\.be\/([^?]+)/);return m?m[1]:'';}

function render(){
  const grid=document.getElementById('videoGrid');
  const filtered=curFilter==='all'?VIDEOS:VIDEOS.filter(v=>v.cat===curFilter);
  grid.innerHTML='';
  filtered.forEach(v=>{
    const watched=watchedSet.has(v.no);
    const ytId=getYtId(v.url);
    const thumb=`https://img.youtube.com/vi/${ytId}/mqdefault.jpg`;
    const card=document.createElement('div');
    card.className='v-card'+(watched?' watched':'');
    card.innerHTML=`
      <div class="v-thumb" onclick="openModal('${v.url}','${v.title||v.name}','${v.no}')">
        <img src="${thumb}" alt="${v.name}" onerror="this.style.display='none'"/>
        <div class="v-play">▶</div>
        ${watched?'<div class="v-done-mark">✓</div>':''}
      </div>
      <div class="v-body">
        <div class="v-num">NO. ${v.no}</div>
        <div class="v-name">${v.title||v.name}</div>
        <div class="v-date">📅 ${v.date}</div>
        ${v.desc&&v.cat!=='317'?`<div class="v-desc">${v.desc}</div>`:''}
      </div>`;
    grid.appendChild(card);
  });
}

function filterVid(cat,btn){
  curFilter=cat;
  document.querySelectorAll('.cat-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  render();
}

function openModal(url,name,no){
  const ytId=getYtId(url);
  document.getElementById('modalIframe').src=`https://www.youtube.com/embed/${ytId}?autoplay=1&rel=0`;
  document.getElementById('modalTitle').textContent=name;
  document.getElementById('modal').classList.add('show');
  if(no&&!watchedSet.has(no)){ saveWatched(no); render(); }
}

function closeModal(){
  document.getElementById('modal').classList.remove('show');
  document.getElementById('modalIframe').src='';
}

document.addEventListener('keydown',e=>{if(e.key==='Escape')closeModal();});
updateCount();
render();
</script>
