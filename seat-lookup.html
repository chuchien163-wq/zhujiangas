const TN={"1": "", "2": "縣政府桌", "3": "", "4": "縣政府桌", "5": "", "6": "", "7": "", "8": "", "9": "", "10": "", "11": ""};
const q=document.getElementById('q');
const result=document.getElementById('result');
q.addEventListener('input',()=>{
  const v=q.value.trim();
  if(!v){result.innerHTML='';return;}
  const hits=PEOPLE.filter(p=>p.name.includes(v));
  if(hits.length===0){result.innerHTML='<div class="empty">找不到「'+v+'」，請確認姓名或洽詢服務人員</div>';return;}
  result.innerHTML=hits.map(p=>{
    const cj=p.unit==='竹建瓦斯'?' cj':'';
    return '<div class="card"><div class="nm'+cj+'">'+p.name+'</div>'+
      '<div class="meta">'+p.unit+(p.title?' · '+p.title:'')+'</div>'+
      '<div class="badge">'+p.table+'桌'+(TN[p.table]?' <small>'+TN[p.table]+'</small>':'')+'</div></div>';
  }).join('');
});
function toggleAll(){
  const box=document.getElementById('allTables');
  if(box.style.display==='none'){
    box.style.display='block';
    box.innerHTML=Object.keys(TABLES).map(t=>{
      const rows=TABLES[t].map(p=>{
        const cj=p.unit==='竹建瓦斯'?' cj':'';
        return '<div class="row"><span class="'+cj.trim()+'">'+p.name+(p.title?' <span class="u">'+p.title+'</span>':'')+'</span><span class="u">'+p.unit+'</span></div>';
      }).join('');
      return '<div class="tbl"><h3>'+t+'桌'+(TN[t]?' · '+TN[t]:'')+' ('+TABLES[t].length+'人)</h3>'+rows+'</div>';
    }).join('');
  }else{box.style.display='none';box.innerHTML='';}
}
