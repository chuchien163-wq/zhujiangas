<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>115/6/10 苗栗縣公用事業管線聯繫會報 餐敘座位查詢</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  :root {
    --maroon: #8B1E2D;
    --maroon-light: #a84452;
    --gold: #E8A33D;
    --gold-light: #F5C46B;
    --bg: #FBF7F2;
    --card: #ffffff;
    --ink: #3a2c25;
    --muted: #8a7a70;
    --line: #ece1d6;
  }
  body {
    font-family: "PingFang TC","Microsoft JhengHei","Heiti TC",system-ui,sans-serif;
    background: var(--bg);
    color: var(--ink);
    line-height: 1.5;
    padding-bottom: 40px;
  }
  header {
    background: linear-gradient(135deg, var(--maroon), var(--maroon-light));
    color: #fff;
    padding: 22px 18px 26px;
    text-align: center;
    box-shadow: 0 2px 12px rgba(139,30,45,.25);
  }
  header .date { font-size: 13px; opacity: .85; letter-spacing: 1px; }
  header h1 { font-size: 19px; margin-top: 6px; font-weight: 700; }
  header .sub { font-size: 13px; opacity: .9; margin-top: 8px; }
  .wrap { max-width: 640px; margin: 0 auto; padding: 0 14px; }

  .search-box {
    margin-top: -18px;
    background: var(--card);
    border-radius: 16px;
    padding: 16px;
    box-shadow: 0 4px 20px rgba(0,0,0,.08);
    position: relative;
    z-index: 5;
  }
  .search-box input {
    width: 100%;
    font-size: 17px;
    padding: 14px 16px;
    border: 2px solid var(--line);
    border-radius: 12px;
    outline: none;
    transition: border-color .2s;
  }
  .search-box input:focus { border-color: var(--gold); }
  .hint { font-size: 12px; color: var(--muted); margin-top: 8px; text-align: center; }

  .tabs {
    display: flex;
    gap: 8px;
    margin: 18px 0 14px;
  }
  .tab {
    flex: 1;
    padding: 11px;
    text-align: center;
    background: var(--card);
    border: 1.5px solid var(--line);
    border-radius: 12px;
    font-size: 15px;
    font-weight: 600;
    color: var(--muted);
    cursor: pointer;
    transition: all .15s;
  }
  .tab.active {
    background: var(--maroon);
    color: #fff;
    border-color: var(--maroon);
  }

  /* search results */
  .result-card {
    background: var(--card);
    border-radius: 14px;
    padding: 18px;
    margin-bottom: 12px;
    box-shadow: 0 2px 10px rgba(0,0,0,.05);
    border-left: 5px solid var(--gold);
    display: flex;
    align-items: center;
    gap: 14px;
  }
  .table-badge {
    flex-shrink: 0;
    width: 64px; height: 64px;
    background: linear-gradient(135deg, var(--maroon), var(--maroon-light));
    color: #fff;
    border-radius: 12px;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
  }
  .table-badge .num { font-size: 26px; font-weight: 800; line-height: 1; }
  .table-badge .lbl { font-size: 11px; opacity: .85; margin-top: 2px; }
  .result-info .name { font-size: 21px; font-weight: 700; }
  .result-info .org { font-size: 14px; color: var(--maroon); font-weight: 600; margin-top: 3px; }
  .result-info .title { font-size: 13px; color: var(--muted); margin-top: 1px; }

  .empty { text-align: center; color: var(--muted); padding: 40px 20px; font-size: 15px; }

  /* overview */
  .table-block {
    background: var(--card);
    border-radius: 14px;
    margin-bottom: 14px;
    overflow: hidden;
    box-shadow: 0 2px 10px rgba(0,0,0,.05);
  }
  .table-head {
    background: var(--maroon);
    color: #fff;
    padding: 12px 16px;
    display: flex; align-items: center; gap: 10px;
  }
  .table-head .t-num { font-size: 18px; font-weight: 800; }
  .table-head .t-cnt { font-size: 13px; opacity: .85; margin-left: auto; }
  .guest-row {
    display: flex; align-items: baseline; gap: 10px;
    padding: 10px 16px;
    border-bottom: 1px solid var(--line);
  }
  .guest-row:last-child { border-bottom: none; }
  .guest-row .g-name { font-size: 16px; font-weight: 600; min-width: 72px; }
  .guest-row .g-org { font-size: 13px; color: var(--maroon); }
  .guest-row .g-title { font-size: 12px; color: var(--muted); margin-left: auto; }
  mark { background: var(--gold-light); border-radius: 3px; padding: 0 2px; }
  footer { text-align:center; font-size:12px; color:var(--muted); margin-top:24px; }
</style>
</head>

const searchInput = document.getElementById('search');
const searchView = document.getElementById('searchView');
const overviewView = document.getElementById('overviewView');
const tabs = document.querySelectorAll('.tab');

tabs.forEach(tab => {
  tab.addEventListener('click', () => {
    tabs.forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    if (tab.dataset.tab === 'search') {
      searchView.style.display = '';
      overviewView.style.display = 'none';
    } else {
      searchView.style.display = 'none';
      overviewView.style.display = '';
    }
  });
});

function esc(s){return s.replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));}

function renderSearch(q) {
  q = q.trim();
  if (!q) {
    searchView.innerHTML = '<div class="empty">請在上方輸入姓名開始查詢</div>';
    return;
  }
  const matches = DATA.filter(d => d.name.includes(q));
  if (matches.length === 0) {
    searchView.innerHTML = '<div class="empty">查無「'+esc(q)+'」，請確認姓名或洽現場服務人員</div>';
    return;
  }
  searchView.innerHTML = matches.map(d => `
    <div class="result-card">
      <div class="table-badge"><div class="num">${d.t}</div><div class="lbl">桌</div></div>
      <div class="result-info">
        <div class="name">${esc(d.name)}</div>
        <div class="org">${esc(d.org)}</div>
        ${d.title?`<div class="title">${esc(d.title)}</div>`:''}
      </div>
    </div>`).join('');
}

function renderOverview() {
  const tables = [...new Set(DATA.map(d=>d.t))].sort((a,b)=>a-b);
  overviewView.innerHTML = tables.map(t => {
    const guests = DATA.filter(d=>d.t===t);
    return `
    <div class="table-block">
      <div class="table-head">
        <span class="t-num">${t}桌</span>
        <span class="t-cnt">${guests.length} 位</span>
      </div>
      ${guests.map(g=>`
        <div class="guest-row">
          <span class="g-name">${esc(g.name)}</span>
          <span class="g-org">${esc(g.org)}</span>
          ${g.title?`<span class="g-title">${esc(g.title)}</span>`:''}
        </div>`).join('')}
    </div>`;
  }).join('');
}

searchInput.addEventListener('input', e => renderSearch(e.target.value));
