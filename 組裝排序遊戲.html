<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>組裝順序排列遊戲 — 竹建學習網</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:"Microsoft JhengHei","微軟正黑體",sans-serif;background:#fff9f0;user-select:none;}

.header{background:#fff;border-bottom:3px solid #FFB830;padding:0.8rem 1.5rem;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50;}
.back-btn{background:#f0f0f0;border:none;padding:7px 16px;border-radius:20px;font-size:13px;cursor:pointer;color:#555;font-family:inherit;}
.htitle{font-size:18px;font-weight:700;color:#1a5c2a;}
.htitle span{color:#FF8C00;}

.game-wrap{padding:1rem;max-width:600px;margin:0 auto;}

/* 計時器 */
.timer-bar{background:#fff;border-radius:14px;padding:1rem 1.5rem;margin-bottom:1rem;border:2px solid #e8f3ec;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;}
.timer-display{display:flex;align-items:center;gap:12px;}
.timer{font-size:2.2rem;font-weight:700;color:#1a5c2a;font-variant-numeric:tabular-nums;min-width:80px;}
.timer.running{color:#FF8C00;animation:pulse 1s ease-in-out infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.7}}
.timer-label{font-size:12px;color:#888;}
.btn-row{display:flex;gap:8px;}
.start-btn{background:#2d8a42;color:#fff;border:none;padding:10px 20px;border-radius:20px;font-size:14px;font-weight:700;font-family:inherit;cursor:pointer;}
.start-btn:disabled{background:#ccc;cursor:not-allowed;}
.reset-btn{background:#fff;color:#888;border:2px solid #ddd;padding:10px 16px;border-radius:20px;font-size:13px;font-weight:700;font-family:inherit;cursor:pointer;}

/* 進度提示 */
.progress-hint{background:#e8f5ec;border-radius:10px;padding:0.7rem 1rem;margin-bottom:1rem;font-size:13px;color:#2d8a42;font-weight:700;text-align:center;}

/* 說明 */
.hint{background:#fff3e0;border-left:4px solid #FFB830;border-radius:0 10px 10px 0;padding:0.8rem 1rem;margin-bottom:1rem;font-size:13px;color:#7a5c00;line-height:1.6;}

/* 拖拉排序區 */
.sort-container{display:grid;grid-template-columns:repeat(7,1fr);gap:5px;margin-bottom:1rem;background:#fff;border-radius:14px;border:2px solid #e8f3ec;padding:0.8rem;}
.drop-slot{border:2px dashed #d0e8d6;border-radius:8px;aspect-ratio:1;display:flex;flex-direction:column;align-items:center;justify-content:center;transition:all 0.2s;position:relative;min-height:60px;}
.drop-slot.drag-over{background:#e8f5ec;border-color:#2d8a42;border-style:solid;}
.drop-slot.filled{border-style:solid;border-color:#c8e6c9;}
.drop-slot.correct{border-color:#2d8a42;background:#f1f8f1;}
.drop-slot.wrong{border-color:#ef5350;background:#fff5f5;}
.slot-num{font-size:11px;font-weight:700;color:#aaa;position:absolute;top:4px;left:6px;}
.slot-num.active{color:#2d8a42;}
.slot-img{width:100%;height:100%;object-fit:cover;border-radius:6px;}

/* 카드 영역 */
.cards-title{font-size:13px;font-weight:700;color:#555;margin-bottom:8px;}
.cards-area{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:1rem;}
@media(max-width:400px){.cards-area{grid-template-columns:repeat(3,1fr);}}
.drag-card{background:#fff;border-radius:10px;border:2px solid #e8f3ec;cursor:grab;transition:transform 0.15s,box-shadow 0.15s,opacity 0.15s;position:relative;overflow:hidden;}
.drag-card:active{cursor:grabbing;}
.drag-card.dragging{opacity:0.4;transform:scale(0.95);}
.drag-card.used{opacity:0.3;pointer-events:none;}
.card-img{width:100%;aspect-ratio:1;object-fit:cover;display:block;}
.card-info-btn{position:absolute;bottom:4px;right:4px;background:rgba(45,138,66,0.85);color:#fff;border:none;width:22px;height:22px;border-radius:50%;font-size:11px;cursor:pointer;display:flex;align-items:center;justify-content:center;}

/* 완성 오버레이 */
.complete-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:200;align-items:center;justify-content:center;}
.complete-overlay.show{display:flex;}
.complete-box{background:#fff;border-radius:20px;padding:2rem;text-align:center;max-width:320px;width:90%;}
.complete-icon{font-size:56px;margin-bottom:0.5rem;}
.complete-title{font-size:22px;font-weight:700;color:#1a5c2a;margin-bottom:0.5rem;}
.complete-time{font-size:32px;font-weight:700;color:#FF8C00;margin-bottom:0.5rem;}
.complete-sub{font-size:13px;color:#888;margin-bottom:1.5rem;}
.complete-btn{background:#2d8a42;color:#fff;border:none;padding:12px 28px;border-radius:20px;font-size:15px;font-weight:700;font-family:inherit;cursor:pointer;}

/* 상세정보 모달 */
.detail-modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:300;align-items:center;justify-content:center;}
.detail-modal.show{display:flex;}
.detail-box{background:#fff;border-radius:16px;padding:1.5rem;max-width:340px;width:90%;}
.detail-img{width:100%;border-radius:10px;margin-bottom:1rem;}
.detail-title{font-size:15px;font-weight:700;color:#1a5c2a;margin-bottom:0.5rem;}
.detail-text{font-size:12px;color:#555;line-height:1.8;word-break:break-all;}
.detail-close{background:#2d8a42;color:#fff;border:none;padding:10px 24px;border-radius:20px;font-size:13px;font-weight:700;font-family:inherit;cursor:pointer;margin-top:1rem;width:100%;}

footer{background:#1a5c2a;color:#a8d5b5;text-align:center;padding:1rem;font-size:11px;margin-top:1rem;}
</style>
</head>
<body>

<div class="header">
  <button class="back-btn" onclick="history.back()">← 返回</button>
  <div class="htitle">🧩 組裝順序<span>排列遊戲</span></div>
</div>

<div class="game-wrap">

  <div class="timer-bar">
    <div class="timer-display">
      <div>
        <div class="timer-label">計時</div>
        <div class="timer" id="timer">00:00</div>
      </div>
    </div>
    <div class="btn-row">
      <button class="reset-btn" onclick="resetGame()">🔄 重置</button>
      <button class="start-btn" id="startBtn" onclick="startGame()">▶ 開始</button>
    </div>
  </div>

  <div class="hint">
    📌 把下方 7 張照片，依照正確的組裝順序拖拉到上方格子！<br/>
    點 <strong>ℹ</strong> 可以查看零件詳細清單
  </div>

  <div class="progress-hint" id="progressHint">⬆️ 把照片拖到上方格子，排出正確順序！</div>

  <!-- 放置區 -->
  <div class="sort-container" id="dropZone"></div>

  <!-- 卡片區 -->
  <div class="cards-title">📦 拖拉照片到上方格子</div>
  <div class="cards-area" id="cardsArea"></div>

</div>

<footer>竹建瓦斯股份有限公司　|　乙級導管配管組裝順序訓練</footer>

<!-- 完成畫面 -->
<div class="complete-overlay" id="completeOverlay">
  <div class="complete-box">
    <div class="complete-icon">🎉</div>
    <div class="complete-title">答對了！太厲害！</div>
    <div class="complete-time" id="completeTime">00:00</div>
    <div class="complete-sub" id="completeSub">繼續加油！</div>
    <button class="complete-btn" onclick="resetGame()">🔄 再挑戰一次</button>
  </div>
</div>

<!-- 詳細資訊 Modal -->
<div class="detail-modal" id="detailModal">
  <div class="detail-box">
    <img class="detail-img" id="detailImg" src="" alt=""/>
    <div class="detail-title" id="detailTitle"></div>
    <div class="detail-text" id="detailText"></div>
    <button class="detail-close" onclick="closeDetail()">關閉</button>
  </div>
</div>

let started = false;
let timerInterval = null;
let seconds = 0;
let slots = new Array(7).fill(null); // 每個 slot 放的是哪個 card index
let dragCardIndex = null;

// 打亂順序
function shuffle(arr){
  const a = [...arr];
  for(let i=a.length-1;i>0;i--){
    const j=Math.floor(Math.random()*(i+1));
    [a[i],a[j]]=[a[j],a[i]];
  }
  return a;
}

let shuffledOrder = shuffle([0,1,2,3,4,5,6]);

function buildDropZone(){
  const zone = document.getElementById('dropZone');
  zone.innerHTML = '';
  for(let i=0;i<7;i++){
    const slot = document.createElement('div');
    slot.className = 'drop-slot';
    slot.dataset.index = i;
    const num = document.createElement('div');
    num.className = 'slot-num';
    num.textContent = i+1;
    slot.appendChild(num);
    if(slots[i] !== null){
      const img = document.createElement('img');
      img.className = 'slot-img';
      img.src = PHOTOS[slots[i]].src;
      slot.appendChild(img);
      slot.classList.add('filled');
      num.classList.add('active');
    }
    slot.addEventListener('dragover', e=>{e.preventDefault();slot.classList.add('drag-over');});
    slot.addEventListener('dragleave', ()=>slot.classList.remove('drag-over'));
    slot.addEventListener('drop', e=>{
      e.preventDefault();
      slot.classList.remove('drag-over');
      if(!started) return;
      if(dragCardIndex === null) return;
      // 如果 slot 已有卡片，先把它放回
      if(slots[i] !== null){
        returnCard(slots[i]);
      }
      // 把卡片放進 slot
      slots[i] = dragCardIndex;
      dragCardIndex = null;
      buildDropZone();
      buildCards();
      checkProgress();
    });
    zone.appendChild(slot);
  }
}

function buildCards(){
  const area = document.getElementById('cardsArea');
  area.innerHTML = '';
  shuffledOrder.forEach((photoIdx, cardPos)=>{
    const used = slots.includes(photoIdx);
    const card = document.createElement('div');
    card.className = 'drag-card' + (used?' used':'');
    card.draggable = !used;
    card.dataset.photoIndex = photoIdx;
    const img = document.createElement('img');
    img.className = 'card-img';
    img.src = PHOTOS[photoIdx].src;
    img.draggable = false;
    card.appendChild(img);
    const infoBtn = document.createElement('button');
    infoBtn.className = 'card-info-btn';
    infoBtn.textContent = 'ℹ';
    infoBtn.onclick = (e)=>{e.stopPropagation();showDetail(photoIdx);};
    card.appendChild(infoBtn);
    card.addEventListener('dragstart', ()=>{
      if(!started) return;
      dragCardIndex = photoIdx;
      card.classList.add('dragging');
    });
    card.addEventListener('dragend', ()=>card.classList.remove('dragging'));
    area.appendChild(card);
  });
}

function returnCard(photoIdx){
  slots = slots.map(s => s===photoIdx ? null : s);
}

function checkProgress(){
  const filled = slots.filter(s=>s!==null).length;
  const hint = document.getElementById('progressHint');
  hint.textContent = `✅ 已放置 ${filled} / 7 張`;
  if(filled === 7){
    checkAnswer();
  }
}

function checkAnswer(){
  let allCorrect = true;
  for(let i=0;i<7;i++){
    if(slots[i] !== i) allCorrect = false;
  }
  if(allCorrect){
    clearInterval(timerInterval);
    const t = formatTime(seconds);
    document.getElementById('completeTime').textContent = t;
    let msg = '';
    if(seconds < 30) msg = '🏆 超級神速！天才！';
    else if(seconds < 60) msg = '🥇 非常厲害！';
    else if(seconds < 120) msg = '👏 答對了！繼續加油！';
    else msg = '💪 完成了！熟練了就會更快！';
    document.getElementById('completeSub').textContent = msg;
    document.getElementById('completeOverlay').classList.add('show');
  } else {
    // 標示對錯
    document.querySelectorAll('.drop-slot').forEach((slot,i)=>{
      if(slots[i]!==null){
        slot.classList.remove('correct','wrong');
        slot.classList.add(slots[i]===i?'correct':'wrong');
      }
    });
    document.getElementById('progressHint').textContent = '❌ 順序有誤！請再檢查看看～';
  }
}

function startGame(){
  started = true;
  seconds = 0;
  document.getElementById('startBtn').disabled = true;
  document.getElementById('timer').classList.add('running');
  timerInterval = setInterval(()=>{
    seconds++;
    document.getElementById('timer').textContent = formatTime(seconds);
  }, 1000);
}

function resetGame(){
  clearInterval(timerInterval);
  started = false;
  seconds = 0;
  slots = new Array(7).fill(null);
  shuffledOrder = shuffle([0,1,2,3,4,5,6]);
  document.getElementById('timer').textContent = '00:00';
  document.getElementById('timer').classList.remove('running');
  document.getElementById('startBtn').disabled = false;
  document.getElementById('progressHint').textContent = '⬆️ 把照片拖到上方格子，排出正確順序！';
  document.getElementById('completeOverlay').classList.remove('show');
  buildDropZone();
  buildCards();
}

function formatTime(s){
  const m = Math.floor(s/60).toString().padStart(2,'0');
  const sec = (s%60).toString().padStart(2,'0');
  return m+':'+sec;
}

function showDetail(idx){
  document.getElementById('detailImg').src = PHOTOS[idx].src;
  document.getElementById('detailTitle').textContent = `第 ${idx+1} 步 零件清單`;
  document.getElementById('detailText').textContent = PHOTOS[idx].detail;
  document.getElementById('detailModal').classList.add('show');
}
function closeDetail(){
  document.getElementById('detailModal').classList.remove('show');
}
