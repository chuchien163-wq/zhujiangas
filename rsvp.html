<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>餐敘出席回覆｜竹建瓦斯</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&family=Noto+Serif+TC:wght@600&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Noto Sans TC', sans-serif;
  background: linear-gradient(135deg, #f8f3e8 0%, #fdf6e3 100%);
  min-height: 100vh;
  padding: 20px 16px 40px;
  color: #3a2a1a;
}
.container { max-width: 600px; margin: 0 auto; }
.header {
  text-align: center;
  padding: 28px 24px 20px;
  background: linear-gradient(135deg, #6b4c11 0%, #9a6f2e 100%);
  border-radius: 16px 16px 0 0;
  color: #fff;
}
.logo-wrap { margin-bottom: 12px; }
.logo-wrap img { width: 64px; height: 64px; border-radius: 50%; background: #fff; padding: 6px; }
.company-name { font-size: 13px; letter-spacing: 2px; opacity: 0.8; margin-bottom: 6px; }
.title { font-family: 'Noto Serif TC', serif; font-size: 26px; font-weight: 600; margin-bottom: 6px; }
.subtitle { font-size: 13px; opacity: 0.75; line-height: 1.6; }
.event-card { background: #fff; border: 0.5px solid #e0d4b8; padding: 20px 24px; }
.event-row {
  display: flex; align-items: flex-start; gap: 10px;
  padding: 8px 0; border-bottom: 0.5px solid #f0e8d4; font-size: 14px;
}
.event-row:last-child { border-bottom: none; }
.event-icon { font-size: 18px; flex-shrink: 0; margin-top: 1px; }
.event-label { color: #8a6a3a; font-size: 12px; margin-bottom: 2px; }
.event-value { font-weight: 500; color: #3a2a1a; }
.map-section { background: #fff; border: 0.5px solid #e0d4b8; overflow: hidden; }
.map-section iframe { width: 100%; height: 200px; border: none; display: block; }
.map-link {
  display: block; text-align: center; padding: 10px;
  background: #fdf6e3; color: #9a6f2e; font-size: 13px;
  text-decoration: none; border-top: 0.5px solid #e0d4b8;
}
.map-link:hover { background: #f8f0d8; }
.contact-bar {
  background: #f8f0d8; border: 0.5px solid #e0d4b8;
  padding: 10px 20px; display: flex; gap: 16px; flex-wrap: wrap;
  font-size: 12px; color: #6a4a1a; justify-content: center;
}
/* 已截止卡片 */
.closed-card {
  background: #fff;
  border: 0.5px solid #e0d4b8;
  border-radius: 0 0 16px 16px;
  padding: 48px 28px;
  text-align: center;
}
.closed-icon { font-size: 56px; margin-bottom: 18px; }
.closed-title {
  font-family: 'Noto Serif TC', serif;
  font-size: 22px; font-weight: 600;
  color: #6b4c11; margin-bottom: 14px;
}
.closed-text {
  font-size: 15px; color: #6a4a2a; line-height: 1.9;
}
.closed-divider {
  width: 48px; height: 2px;
  background: #d4b896;
  margin: 22px auto;
  border-radius: 2px;
}
.closed-note {
  font-size: 13px; color: #8a6a3a; line-height: 1.7;
}
.footer-note {
  text-align: center; font-size: 12px; color: #8a6a3a;
  margin-top: 14px; line-height: 1.6;
}
</style>
</head>
<body>
<div class="container">
  <!-- 標題 -->
  <div class="header">
    <div class="logo-wrap">
      <img src="https://chuchien163-wq.github.io/zhujiangas/logo.png" alt="竹建瓦斯" onerror="this.style.display='none'">
    </div>
    <div class="company-name">竹建瓦斯股份有限公司</div>
    <div class="title">餐敘出席回覆</div>
    <div class="subtitle">115年苗栗縣公用事業管線聯繫會報<br>會後餐敘</div>
  </div>
  <!-- 活動資訊 -->
  <div class="event-card">
    <div class="event-row">
      <div class="event-icon">📅</div>
      <div>
        <div class="event-label">日期</div>
        <div class="event-value">115年6月10日（星期三）</div>
      </div>
    </div>
    <div class="event-row">
      <div class="event-icon">🕐</div>
      <div>
        <div class="event-label">時間</div>
        <div class="event-value">入席 17:30　開席 18:00</div>
      </div>
    </div>
    <div class="event-row">
      <div class="event-icon">📍</div>
      <div>
        <div class="event-label">地點</div>
        <div class="event-value">千璽會館｜璀璨廳（苗栗市國華路947號）</div>
      </div>
    </div>
  </div>
  <!-- 地圖 -->
  <div class="map-section">
    <iframe
      src="https://maps.google.com/maps?q=苗栗縣苗栗市國華路947號千璽會館&hl=zh-TW&z=16&output=embed"
      allowfullscreen loading="lazy">
    </iframe>
    <a class="map-link" href="https://maps.google.com/?q=苗栗縣苗栗市國華路947號" target="_blank">
      📌 點此開啟導航 →
    </a>
  </div>
  <!-- 聯絡資訊 -->
  <div class="contact-bar">
    <span>📠 傳真：037-474450</span>
    <span>📞 聯絡人：白沛豫　037-462871</span>
  </div>
  <!-- 已截止 -->
  <div class="closed-card">
    <div class="closed-icon">🙏</div>
    <div class="closed-title">出席回覆已截止</div>
    <div class="closed-text">
      感謝您的支持與參與，<br>
      本次餐敘出席回覆已截止填寫。
    </div>
    <div class="closed-divider"></div>
    <div class="closed-note">
      如有任何問題或需更動，<br>
      敬請來電竹建瓦斯管理部<br>
      白沛豫小姐　037-462871
    </div>
  </div>
  <div class="footer-note">
    竹建瓦斯股份有限公司　敬上
  </div>
</div>
</body>
</html>
