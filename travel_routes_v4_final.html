*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans TC',sans-serif;background:#F5F4F0;color:#1A1A1A;font-size:15px}

/* ── LAYOUT ── */
.app{display:flex;height:100vh;overflow:hidden}

/* ── SIDEBAR ── */
.sidebar{width:230px;flex-shrink:0;background:#fff;border-right:1px solid #E8E6E0;overflow-y:auto;display:flex;flex-direction:column}
.sidebar-logo{padding:20px 16px 12px;border-bottom:1px solid #F0EEE8}
.sidebar-logo h1{font-size:14px;font-weight:700;color:#1A1A1A;letter-spacing:.02em}
.sidebar-logo p{font-size:11px;color:#999;margin-top:2px}
.nav-group{padding:12px 0 4px}
.nav-group-label{padding:0 16px 6px;font-size:10px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:#AAAAAA}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 16px;cursor:pointer;border-left:3px solid transparent;transition:all .15s;position:relative}
.nav-item:hover{background:#F8F7F3}
.nav-item.active{background:#F8F7F3}
.nav-item.active-au{border-left-color:#1D9E75;background:#F0FAF5}
.nav-item.active-jp{border-left-color:#6C63D8;background:#F3F2FD}
.nav-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.nav-body{flex:1;min-width:0}
.nav-name{font-size:13px;font-weight:500;color:#333;line-height:1.3;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.nav-item.active-au .nav-name{color:#0A6640}
.nav-item.active-jp .nav-name{color:#4B44A8}
.nav-agency{font-size:11px;color:#AAA;margin-top:1px}
.nav-days{font-size:11px;font-weight:500;padding:2px 6px;border-radius:8px;flex-shrink:0}
.nav-item.active-au .nav-days{background:#D4F0E4;color:#0A6640}
.nav-item.active-jp .nav-days{background:#E0DEFA;color:#4B44A8}
.nav-item:not(.active-au):not(.active-jp) .nav-days{background:#F0EEE8;color:#888}

/* ── MAIN ── */
.main{flex:1;overflow-y:auto;background:#F5F4F0}

/* ── TRIP HEADER ── */
.trip-header{background:#fff;padding:24px 32px 20px;border-bottom:1px solid #ECEAE4;position:sticky;top:0;z-index:10}
.trip-dest-badge{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;padding:3px 10px;border-radius:20px;margin-bottom:8px}
.trip-title{font-size:22px;font-weight:700;color:#1A1A1A;margin-bottom:10px;line-height:1.3}
.trip-meta-row{display:flex;gap:6px;flex-wrap:wrap}
.meta-chip{display:inline-flex;align-items:center;gap:4px;font-size:12px;color:#666;background:#F5F4F0;padding:4px 10px;border-radius:20px}
.warn-strip{margin:12px 32px 0;padding:10px 14px;background:#FFFBEB;border-left:3px solid #F59E0B;border-radius:0 8px 8px 0;font-size:13px;color:#92400E;line-height:1.6}

/* ── CONTENT ── */
.content-body{padding:20px 32px 40px}

/* ── DAY BLOCK ── */
.day-block{margin-bottom:28px;background:#fff;border-radius:12px;overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.day-header{display:flex;align-items:center;gap:12px;padding:14px 20px;border-bottom:1px solid #F0EEE8}
.day-badge{font-size:11px;font-weight:700;padding:3px 10px;border-radius:20px;letter-spacing:.06em}
.day-title-text{font-size:14px;font-weight:500;color:#333;flex:1}

/* ── DAY IMAGE ── */
.day-img{width:100%;height:180px;object-fit:cover;display:block;background:#EEE}
.day-img-placeholder{width:100%;height:180px;background:linear-gradient(135deg,#E8E6E0,#D4D2CC);display:flex;align-items:center;justify-content:center;font-size:13px;color:#999}

/* ── TIMELINE ── */
.timeline{padding:16px 20px 8px}
.tl-item{display:flex;gap:14px;padding-bottom:4px}
.tl-left{display:flex;flex-direction:column;align-items:center;width:14px;flex-shrink:0;padding-top:4px}
.tl-dot{width:14px;height:14px;border-radius:50%;flex-shrink:0;border:2.5px solid #fff;box-shadow:0 0 0 1.5px currentColor}
.tl-line{flex:1;width:2px;background:#ECEAE4;margin:3px 0}
.tl-item:last-child .tl-line{display:none}
.tl-right{flex:1;padding-bottom:16px}
.tl-place{font-size:15px;font-weight:500;color:#1A1A1A;line-height:1.4;margin-bottom:5px}
.tl-connector{display:flex;align-items:center;gap:8px;margin-bottom:4px;flex-wrap:wrap}
.tl-badge{display:inline-flex;align-items:center;gap:4px;font-size:12px;font-weight:500;padding:3px 10px;border-radius:12px;white-space:nowrap}
.tl-meta{font-size:13px;color:#888}
.tl-note{font-size:13px;color:#666;line-height:1.6;background:#F8F7F3;border-radius:8px;padding:7px 10px;margin-top:5px}
.tl-dest{font-size:15px;font-weight:500;color:#1A1A1A;margin-top:4px}

/* ── TRANSPORT BADGES ── */
.fly{background:#EBF4FF;color:#1D5FA8}
.drv{background:#FEF3E0;color:#92540A}
.wlk{background:#EDFAED;color:#1A6B2E}
.boa{background:#FDF0F5;color:#9B2457}
.trn{background:#F3F1F8;color:#5548A8}
.rst{background:#F3F3F3;color:#777}

/* ── DEST COLORS ── */
.au-badge{background:#D4F0E4;color:#0A6640}
.jp-badge{background:#E0DEFA;color:#4B44A8}
</style>
</head>

const DAY_COLORS=["#1D9E75","#185FA5","#854F0B","#A32D2D","#3C3489","#0F6E56","#633806","#3B6D11","#72243E"];

function buildNav(){
  const nav=document.getElementById("nav-content");
  const groups=[{label:"日本行程",dest:"日本"},{label:"澳洲行程",dest:"澳洲"}];
  let html="";
  groups.forEach(g=>{
    html+=`<div class="nav-group"><div class="nav-group-label">${g.label}</div>`;
    TOURS.filter(t=>t.dest===g.dest).forEach(t=>{
      const i=TOURS.indexOf(t);
      const isAu=t.dest==="澳洲";
      const c=isAu?"#1D9E75":"#6C63D8";
      html+=`<div class="nav-item" data-i="${i}" onclick="sel(${i})">
        <span class="nav-dot" style="background:${c}"></span>
        <div class="nav-body">
          <div class="nav-name">${t.label}</div>
          <div class="nav-agency">${t.agency}</div>
        </div>
        <span class="nav-days">${t.days}</span>
      </div>`;
    });
    html+=`</div>`;
  });
  nav.innerHTML=html;
}

function buildMain(idx){
  const t=TOURS[idx];
  const isAu=t.dest==="澳洲";
  const c=isAu?"#0A6640":"#4B44A8";
  const badgeCls=isAu?"au-badge":"jp-badge";
  let h=`<div class="trip-header">
    <div class="trip-dest-badge ${badgeCls}">${t.dest} · ${t.days}</div>
    <div class="trip-title">${t.label}</div>
    <div class="trip-meta-row">
      <span class="meta-chip">📋 ${t.agency}</span>
      <span class="meta-chip">✈ ${t.airline}</span>
      <span class="meta-chip">🗺 ${t.cities}</span>
      ${t.price!=="未標示"?`<span class="meta-chip">💰 ${t.price}</span>`:""}
    </div>
  </div>`;
  if(t.warn) h+=`<div class="warn-strip">⚠️ ${t.warn}</div>`;
  h+=`<div class="content-body">`;
  t.dd.forEach((d,di)=>{
    const dc=DAY_COLORS[di%DAY_COLORS.length];
    const img=getDayImg(d.title);
    h+=`<div class="day-block">
      <div class="day-header">
        <span class="day-badge" style="background:${dc}22;color:${dc}">${d.day}</span>
        <span class="day-title-text">${d.title}</span>
      </div>`;
    if(img){
      h+=`<img class="day-img" src="${img}" alt="${d.title}" onerror="this.style.display='none'">`;
    }
    h+=`<div class="timeline">`;
    d.routes.forEach((r,ri)=>{
      const dotC=DC[r.tp]||"#AAA";
      const isLast=ri===d.routes.length-1;
      h+=`<div class="tl-item">
        <div class="tl-left">
          <div class="tl-dot" style="background:${dotC};color:${dotC}"></div>
          <div class="tl-line"></div>
        </div>
        <div class="tl-right">
          <div class="tl-place">${r.f}</div>
          <div class="tl-connector">
            <span class="tl-badge ${r.tp}">${TL[r.tp]||r.tp}</span>
            <span class="tl-meta">${r.time}${r.dist!=="—"?" &nbsp;·&nbsp; "+r.dist:""}</span>
          </div>
          ${isLast?`<div class="tl-dest">${r.t}</div>`:""}
          ${r.note?`<div class="tl-note">${r.note}</div>`:""}
        </div>
      </div>`;
    });
    h+=`</div></div>`;
  });
  h+=`</div>`;
  document.getElementById("main").innerHTML=h;
  document.getElementById("main").scrollTop=0;
}

function sel(idx){
  document.querySelectorAll(".nav-item").forEach(el=>{
    const i=parseInt(el.dataset.i);
    const t=TOURS[i];
    const cls=i===idx?(t.dest==="澳洲"?"active-au":"active-jp"):"";
    el.className="nav-item"+(cls?" "+cls:"");
  });
  buildMain(idx);
}

buildNav();
sel(0);
</script>
</body>
</html>
