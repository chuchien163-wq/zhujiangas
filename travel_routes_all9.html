<title>竹建旅遊行程 點到點距離總覽</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --au:#1D6A4A;--au-light:#E1F5EE;--au-mid:#5DCAA5;
  --jp:#3C3489;--jp-light:#EEEDFE;--jp-mid:#7F77DD;
  --bg:#F7F6F2;--white:#FFFFFF;--text:#1A1A1A;--muted:#6B6B6B;
  --border:#E0DED8;--shadow:0 1px 3px rgba(0,0,0,.08);
  --fly-color:#185FA5;--drive-color:#854F0B;--walk-color:#3B6D11
}
body{font-family:'Helvetica Neue',Arial,'Hiragino Sans GB',sans-serif;background:var(--bg);color:var(--text);font-size:14px;line-height:1.6}

/* ── HEADER ── */
.header{background:var(--text);color:#fff;padding:20px 24px 16px;position:sticky;top:0;z-index:100}
.header-top{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px}
.header h1{font-size:17px;font-weight:600;letter-spacing:.02em}
.header-sub{font-size:12px;opacity:.6;margin-top:2px}
.legend{display:flex;gap:12px;flex-wrap:wrap}
.leg-item{display:flex;align-items:center;gap:5px;font-size:11px;opacity:.85}
.leg-dot{width:10px;height:10px;border-radius:50%}

/* ── TABS ── */
.tabs-wrap{background:#fff;border-bottom:1px solid var(--border);padding:0 12px;overflow-x:auto;white-space:nowrap}
.tab-btn{display:inline-flex;align-items:center;gap:6px;padding:12px 14px;font-size:12px;font-weight:500;border:none;background:none;cursor:pointer;color:var(--muted);border-bottom:2px solid transparent;transition:all .15s;white-space:nowrap}
.tab-btn:hover{color:var(--text)}
.tab-btn.active-au{color:var(--au);border-bottom-color:var(--au)}
.tab-btn.active-jp{color:var(--jp);border-bottom-color:var(--jp)}
.tab-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}

/* ── PANES ── */
.pane{display:none;padding:16px}
.pane.active{display:block}
.trip-header{background:#fff;border:1px solid var(--border);border-radius:10px;padding:14px 16px;margin-bottom:14px}
.trip-title{font-size:16px;font-weight:600;margin-bottom:4px}
.trip-meta{display:flex;gap:16px;flex-wrap:wrap;font-size:12px;color:var(--muted)}
.trip-meta span{display:flex;align-items:center;gap:4px}

/* ── DAY CARDS ── */
.day-section{margin-bottom:12px}
.day-label{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);padding:6px 0 4px;border-bottom:1px solid var(--border);margin-bottom:8px}
.route-table{width:100%;border-collapse:collapse}
.route-table th{font-size:11px;font-weight:500;color:var(--muted);text-align:left;padding:5px 8px;background:#F9F8F5;border-bottom:1px solid var(--border)}
.route-table td{padding:8px;border-bottom:1px solid #F0EFE9;vertical-align:top;font-size:13px}
.route-table tr:last-child td{border-bottom:none}
.route-table tr:hover td{background:#FAFAF7}
.from-to{font-weight:500;line-height:1.4}
.from-to .arrow{color:var(--muted);margin:0 4px;font-size:11px}
.transport-badge{display:inline-flex;align-items:center;gap:4px;font-size:11px;padding:2px 8px;border-radius:12px;font-weight:500;white-space:nowrap}
.t-fly{background:#E6F1FB;color:var(--fly-color)}
.t-drive{background:#FAEEDA;color:var(--drive-color)}
.t-walk{background:#EAF3DE;color:var(--walk-color)}
.t-boat{background:#FBEAF0;color:#72243E}
.t-train{background:#F1EFE8;color:#444441}
.time-val{font-weight:600;font-size:13px;color:var(--text)}
.dist-val{color:var(--muted);font-size:12px}
.note-cell{font-size:11px;color:var(--muted);line-height:1.5}

/* ── SUMMARY CARDS ── */
.summary-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:8px;margin-bottom:14px}
.sum-card{background:#fff;border:1px solid var(--border);border-radius:8px;padding:10px 12px;text-align:center}
.sum-num{font-size:20px;font-weight:600}
.sum-lbl{font-size:11px;color:var(--muted);margin-top:2px}
.au-num{color:var(--au)}
.jp-num{color:var(--jp)}

@media(max-width:600px){
  .route-table th:nth-child(4),.route-table td:nth-child(4){display:none}
  .pane{padding:10px}
}
</style>
</head>

const TRANSPORT_CLASS = {fly:"t-fly",drive:"t-drive",walk:"t-walk",boat:"t-boat",train:"t-train"};
const TRANSPORT_LABEL = {fly:"✈ 飛機",drive:"🚌 遊覽車/開車",walk:"🚶 步行",boat:"⛵ 遊船/渡輪",train:"🚃 火車/電車"};

function buildTabs(){
  const wrap = document.getElementById("tabs");
  TOURS.forEach((t,i)=>{
    const isAu = t.dest==="澳洲";
    const btn = document.createElement("button");
    btn.className = "tab-btn" + (i===0?" active-au":"");
    btn.dataset.idx = i;
    btn.innerHTML = `<span class="tab-dot" style="background:${isAu?"#1D9E75":"#7F77DD"}"></span>${t.label}`;
    btn.addEventListener("click",()=>switchTab(i));
    wrap.appendChild(btn);
  });
}

function buildContent(){
  const wrap = document.getElementById("content");
  TOURS.forEach((t,i)=>{
    const isAu = t.dest==="澳洲";
    const pane = document.createElement("div");
    pane.className = "pane" + (i===0?" active":"");
    pane.id = "pane"+i;

    // trip header
    pane.innerHTML = `
      <div class="trip-header">
        <div class="trip-title">${t.label}</div>
        <div class="trip-meta">
          <span style="color:${isAu?"var(--au)":"var(--jp)"};font-weight:600">${t.dest}</span>
          <span>📋 ${t.agency}</span>
          <span>📅 ${t.days}</span>
          <span>✈ ${t.airline}</span>
          <span>💰 ${t.price}</span>
          <span>🗺 ${t.cities}</span>
        </div>
      </div>`;

    // days
    t.days_data.forEach(d=>{
      const sec = document.createElement("div");
      sec.className = "day-section";
      let rows = d.routes.map(r=>`
        <tr>
          <td class="from-to">${r.from}<span class="arrow">→</span>${r.to}</td>
          <td><span class="transport-badge ${TRANSPORT_CLASS[r.transport]}">${TRANSPORT_LABEL[r.transport]}</span></td>
          <td><span class="time-val">${r.time}</span></td>
          <td><span class="dist-val">${r.dist}</span></td>
          <td class="note-cell">${r.note}</td>
        </tr>`).join("");
      sec.innerHTML = `
        <div class="day-label">${d.day}　${d.title}</div>
        <table class="route-table">
          <thead><tr>
            <th style="width:32%">路段（出發 → 抵達）</th>
            <th style="width:16%">交通方式</th>
            <th style="width:12%">時間</th>
            <th style="width:10%">距離</th>
            <th>備註</th>
          </tr></thead>
          <tbody>${rows}</tbody>
        </table>`;
      pane.appendChild(sec);
    });
    wrap.appendChild(pane);
  });
}

function switchTab(idx){
  document.querySelectorAll(".tab-btn").forEach((b,i)=>{
    b.className = "tab-btn";
    if(i===idx){
      b.className = "tab-btn " + (TOURS[idx].dest==="澳洲"?"active-au":"active-jp");
    }
  });
  document.querySelectorAll(".pane").forEach((p,i)=>{
    p.className = "pane" + (i===idx?" active":"");
  });
}

buildTabs();
buildContent();
</script>
