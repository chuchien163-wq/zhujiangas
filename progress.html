<meta charset="UTF-8"/>

<title>我的進度 — 竹建學習網</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:"Microsoft JhengHei","微軟正黑體","Noto Sans TC",sans-serif;background:#1c1c1e;color:#e0e0e0;}
.wrap{display:flex;min-height:100vh;}
.sidebar{width:200px;background:#111;border-right:1px solid #2a2a2a;padding:1.2rem 0;flex-shrink:0;position:sticky;top:0;height:100vh;display:flex;flex-direction:column;}
.sb-logo{padding:0 1rem 1.2rem;border-bottom:1px solid #2a2a2a;margin-bottom:1rem;display:flex;align-items:center;gap:8px;}
.sb-brand{font-size:15px;font-weight:700;color:#FFD60A;letter-spacing:1px;}
.sb-sub{font-size:12px;color:#aaa;margin-top:2px;}
.sb-section{font-size:12px;color:#aaa;font-weight:700;letter-spacing:2px;padding:0 1rem;margin:1rem 0 0.4rem;}
.sb-item{display:flex;align-items:center;gap:10px;padding:0.6rem 1rem;font-size:14px;color:#ccc;cursor:pointer;border-left:3px solid transparent;transition:all 0.15s;text-decoration:none;}
.sb-item:hover{background:#1c1c1e;color:#e0e0e0;}
.sb-item.active{background:#1c1c1e;color:#FFD60A;border-left-color:#FFD60A;font-weight:700;}
.sb-icon{font-size:16px;width:20px;text-align:center;flex-shrink:0;}
.sb-flex{flex:1;}
.sb-user{padding:1rem;border-top:1px solid #2a2a2a;display:flex;align-items:center;gap:8px;}
.sb-av{width:34px;height:34px;border-radius:50%;background:#FFD60A;color:#000;font-size:14px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.sb-uname{font-size:13px;font-weight:700;color:#e0e0e0;}
.sb-role{font-size:11px;color:#777;}
.main{flex:1;padding:1.5rem;overflow:auto;}
.main-title{font-size:20px;font-weight:700;color:#fff;margin-bottom:1.5rem;}

/* 統計卡 */
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:1.5rem;}
.stat{background:#2c2c2e;border-radius:10px;padding:1rem;border:1px solid #3a3a3c;text-align:center;}
.stat-num{font-size:24px;font-weight:700;margin-bottom:4px;}
.stat-label{font-size:12px;color:#8e8e93;}
.stat.g .stat-num{color:#30d158;}
.stat.o .stat-num{color:#ff9f0a;}
.stat.b .stat-num{color:#0a84ff;}
.stat.p .stat-num{color:#bf5af2;}

/* 進度條 */
.prog-box{background:#2c2c2e;border-radius:12px;padding:1.2rem;border:1px solid #3a3a3c;margin-bottom:1rem;}
.prog-box-title{font-size:15px;font-weight:700;color:#fff;margin-bottom:1rem;}
.prog-row{display:flex;align-items:center;gap:10px;margin-bottom:10px;}
.prog-label{font-size:13px;color:#8e8e93;width:70px;flex-shrink:0;}
.prog-bar{flex:1;height:6px;background:#3a3a3c;border-radius:3px;overflow:hidden;}
.prog-fill{height:100%;border-radius:3px;transition:width 0.5s;}
.fill-g{background:#30d158;}
.fill-o{background:#ff9f0a;}
.prog-val{font-size:13px;font-weight:700;width:45px;text-align:right;}

/* 影片明細 */
.video-box{background:#2c2c2e;border-radius:12px;border:1px solid #3a3a3c;overflow:hidden;margin-bottom:1rem;}
.video-box-title{font-size:15px;font-weight:700;color:#fff;padding:1rem 1.2rem;border-bottom:1px solid #3a3a3c;}
.video-row{display:flex;align-items:center;gap:12px;padding:0.8rem 1.2rem;border-bottom:1px solid #2a2a2a;transition:background 0.15s;}
.video-row:last-child{border-bottom:none;}
.video-row:hover{background:#3a3a3c;}
.v-num{font-size:12px;color:#8e8e93;width:28px;font-weight:700;flex-shrink:0;}
.v-name{font-size:14px;color:#e0e0e0;flex:1;}
.v-date{font-size:12px;color:#8e8e93;width:80px;text-align:right;flex-shrink:0;}
.v-tag{font-size:11px;padding:2px 8px;border-radius:4px;flex-shrink:0;font-weight:700;}
.v-done{background:#0a2a0a;color:#30d158;}
.v-wait{background:#2a2a2a;color:#555;}
.v-done-check{color:#30d158;font-size:16px;flex-shrink:0;}
.v-wait-check{color:#3a3a3c;font-size:16px;flex-shrink:0;}

/* 遊戲記錄 */
.game-box{background:#2c2c2e;border-radius:12px;padding:1.2rem;border:1px solid #3a3a3c;margin-bottom:1rem;}
.game-empty{text-align:center;padding:2rem;color:#555;font-size:14px;}

@media(max-width:700px){
  .sidebar{display:none;}
  .main{padding:1rem;}
  .stats-row{grid-template-columns:repeat(2,1fr) !important;}
}
</style>

<script>
(function(){const u=sessionStorage.getItem('user');if(!u)window.location.href='index.html';})();
const user=JSON.parse(sessionStorage.getItem('user')||'{}');
document.getElementById('sbAv').textContent=user.name?user.name[0]:'?';
document.getElementById('sbName').textContent=user.name||'訪客';
document.getElementById('sbRole').textContent=user.isAdmin?'管理者':'學員';

const VIDEOS=[
  {no:'01',name:'1150317-01',date:'115/03/17'},{no:'02',name:'1150317-02',date:'115/03/17'},
  {no:'03',name:'1150317-03',date:'115/03/17'},{no:'04',name:'1150317-04',date:'115/03/17'},
  {no:'05',name:'1150317-05',date:'115/03/17'},{no:'06',name:'1150317-06',date:'115/03/17'},
  {no:'07',name:'1150424-01',date:'115/04/24'},{no:'08',name:'1150424-02',date:'115/04/24'},
  {no:'09',name:'1150424-03',date:'115/04/24'},{no:'10',name:'1150424-04',date:'115/04/24'},
  {no:'11',name:'1150424-05',date:'115/04/24'},{no:'12',name:'1150424-06',date:'115/04/24'},
  {no:'13',name:'1150424-07',date:'115/04/24'},
];

const watched=JSON.parse(localStorage.getItem('watched_'+user.name)||'[]');
const watchedSet=new Set(watched);
const pct=Math.round(watched.length/13*100);

document.getElementById('statVideo').innerHTML=watched.length+'<span style="font-size:15px;color:#555;font-weight:400;">/13</span>';
document.getElementById('statPct').innerHTML=pct+'<span style="font-size:15px;color:#555;font-weight:400;">%</span>';
document.getElementById('statRemain').innerHTML=(13-watched.length)+'<span style="font-size:15px;color:#555;font-weight:400;">部</span>';
document.getElementById('videoFill').style.width=pct+'%';
document.getElementById('videoVal').textContent=watched.length+'/13';

const gameCount=parseInt(localStorage.getItem('game_'+user.name)||'0');
document.getElementById('statGame').innerHTML=gameCount+'<span style="font-size:15px;color:#555;font-weight:400;">次</span>';
document.getElementById('gameFill').style.width=Math.min(gameCount/10*100,100)+'%';
document.getElementById('gameVal').textContent=gameCount+'次';

const list=document.getElementById('videoList');
VIDEOS.forEach(v=>{
  const done=watchedSet.has(v.no)||watchedSet.has(Number(v.no))||watchedSet.has(v.name);
  const row=document.createElement('div');
  row.className='video-row';
  row.innerHTML=`
    <div class="v-num">${v.no}</div>
    <div class="v-name">${v.name}</div>
    <div class="v-date">${v.date}</div>
    <div class="v-tag ${done?'v-done':'v-wait'}">${done?'已看完':'未觀看'}</div>
    <div class="${done?'v-done-check':'v-wait-check'}">${done?'✓':'○'}</div>`;
  list.appendChild(row);
});

const gameEl=document.getElementById('gameRecord');
if(gameCount===0){
  gameEl.innerHTML='<div class="game-empty">尚未挑戰過遊戲，快去試試看！🎮</div>';
}else{
  gameEl.innerHTML=`<div style="font-size:15px;color:#e0e0e0;">共挑戰 <span style="color:#ff9f0a;font-weight:700;">${gameCount}</span> 次！繼續加油！💪</div>`;
}
</script>
